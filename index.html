<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iOS風 ホイールピッカー テスト</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f5f5f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* ピッカーの外枠（コンテナ） */
        .picker-container {
            position: relative;
            width: 120px;
            height: 200px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            overflow: hidden;
            /* 3D空間の奥行きを設定 */
            perspective: 1000px; 
        }

        /* 中央の選択エリアを示す上下の線 */
        .picker-highlight {
            position: absolute;
            top: 50%;
            left: 5%;
            width: 90%;
            height: 40px;
            transform: translateY(-50%);
            border-top: 1px solid rgba(0, 0, 0, 0.1);
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
            pointer-events: none; /* マウスイベントを透過 */
        }

        /* 実際にスクロールさせる要素 */
        .picker-scroller {
            width: 100%;
            height: 100%;
            overflow-y: scroll;
            /* スクロールバーを隠し、スナップ（吸い付き）を有効化 */
            scroll-snap-type: y mandatory;
            scrollbar-width: none; /* Firefox用 */
        }

        /* Chrome, Safari用のスクロールバー非表示 */
        .picker-scroller::-webkit-scrollbar {
            display: none;
        }

        /* リストの土台 */
        .picker-list {
            list-style: none;
            padding: 0;
            margin: 0;
            /* 上下に余白を作って、最初と最後の要素が中央にくるようにする */
            padding-top: 80px;
            padding-bottom: 80px;
        }

        /* 各選択肢（アイテム） */
        .picker-item {
            height: 40px;
            line-height: 40px;
            text-align: center;
            font-size: 20px;
            font-weight: 600;
            color: #333;
            scroll-snap-align: center; /* 中央にスナップさせる */
            
            /* 3D変形の基準点を設定 */
            transform-style: preserve-3d;
            backface-visibility: hidden;
            transition: transform 0.1s ease-out, opacity 0.1s ease-out;
        }
    </style>
</head>
<body>

    <div class="picker-container">
        <div class="picker-highlight"></div>
        
        <div class="picker-scroller" id="scroller">
            <ul class="picker-list" id="pickerList">
                </ul>
        </div>
    </div>

    <script>
        const pickerList = document.getElementById('pickerList');
        const scroller = document.getElementById('scroller');
        const itemHeight = 40; // CSSのheightと合わせる

        // 1. 0〜23の時間を生成
        for (let i = 0; i < 24; i++) {
            const li = document.createElement('li');
            li.className = 'picker-item';
            // 1桁の数字は「00」のようにパディング
            li.textContent = String(i).padStart(2, '0');
            pickerList.appendChild(li);
        }

        const items = document.querySelectorAll('.picker-item');

        // 2. スクロール位置に応じて各アイテムを3D回転させる関数
        function updatePickerRotation() {
            const scrollTop = scroller.scrollTop;

            items.forEach((item, index) => {
                // 中央（選択位置）からの距離を計算
                const itemOffset = (index * itemHeight) - scrollTop;
                
                // 回転角度の計算（中央から離れるほど傾く）
                // 角度が大きすぎると崩れるので、最大±90度以内に収まるよう調整
                const angle = (itemOffset / itemHeight) * -20; 

                if (Math.abs(angle) < 90) {
                    // 立体的な円柱に貼り付いているようにz軸方向に引っ込める（translateZ）
                    item.style.transform = `rotateX(${angle}deg) translateZ(90px)`;
                    // 中央から離れるほど薄くする
                    const opacity = Math.max(0, 1 - Math.abs(itemOffset / (itemHeight * 3)));
                    item.style.opacity = opacity;
                } else {
                    item.style.opacity = 0;
                }
            });
        }

        // スクロール時にリアルタイムで回転を更新
        scroller.addEventListener('scroll', updatePickerRotation);

        // 初期表示時にも実行
        updatePickerRotation();
    </script>

</body>
</html>
