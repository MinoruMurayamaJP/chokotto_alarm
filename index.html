<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>ホイール選択テスト 感度00-20版</title>
<style>
:root{--bg:#f5f7fb;--panel:#fff;--line:#d8e2f0;--text:#142033;--blue:#0b78ff;--blue2:#e3f2fd;--green:#e8f5e9}
*{box-sizing:border-box}
body{margin:0;font-family:"Yu Gothic",Meiryo,system-ui,sans-serif;background:var(--bg);color:var(--text);overscroll-behavior:none;-webkit-text-size-adjust:100%}
.app{max-width:820px;margin:18px auto;padding:14px}
h1{font-size:24px;margin:0 0 12px;text-align:center}
.panel{background:#fff;border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:14px;box-shadow:0 4px 18px rgba(15,23,42,.06)}
.result{text-align:center;font-size:42px;font-weight:900;margin:14px 0;letter-spacing:.04em}
.btns,.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
button,select{height:52px;border-radius:14px;border:1px solid #9ec5fe;background:var(--blue2);color:#075fc5;font-size:17px;font-weight:900}
button.primary{background:#0b78ff;color:#fff;border-color:#0b78ff}
button.green{background:var(--green);color:#15803d;border-color:#86efac}
.field label{display:block;font-size:14px;font-weight:900;margin:0 0 6px}
.field select{width:100%;background:#fff;color:#142033;border-color:var(--line);padding:0 12px}
.modal{position:fixed;inset:0;background:rgba(15,23,42,.35);display:none;align-items:center;justify-content:center;padding:14px;z-index:50;overscroll-behavior:none}
.modal.show{display:flex}
.dialog{background:#fff;border-radius:28px;width:min(720px,100%);max-height:94vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.28)}
.head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--line)}
.head h2{margin:0;font-size:22px}
.iconBtn{width:56px;height:56px;border-radius:50%;font-size:32px;display:flex;align-items:center;justify-content:center}
.ok{background:#0b78ff;color:#fff;border-color:#0b78ff}
.close{background:#f5f5f5;color:#111;border-color:#d0d0d0}
.body{padding:18px 20px 22px}

/* モード1：7行ホイール */
.picker{position:relative;display:flex;align-items:center;justify-content:center;gap:10px;width:100%;height:308px;margin:0 auto 14px;border-radius:34px;background:linear-gradient(180deg,#fff 0%,#f9fbfd 48%,#f1f5f8 100%);box-shadow:0 12px 30px rgba(15,23,42,.10), inset 0 1px 0 rgba(255,255,255,.95);overflow:hidden;touch-action:none}
.picker:before{content:"";position:absolute;left:24px;right:24px;top:calc(50% - 29px);height:58px;border-radius:999px;background:#e9edf0;z-index:0}
.picker:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.88) 0%,rgba(255,255,255,.35) 12%,rgba(255,255,255,0) 30%,rgba(255,255,255,0) 70%,rgba(255,255,255,.35) 88%,rgba(255,255,255,.88) 100%);pointer-events:none;z-index:3}
.col{position:relative;z-index:2;width:86px;height:294px;overflow:visible;touch-action:none;-webkit-user-select:none;user-select:none}
.items{height:294px;padding:0;display:flex;flex-direction:column;justify-content:center;overflow:visible}
.item{height:34px;line-height:34px;text-align:center;font-size:24px;font-weight:800;color:#a8adb4;cursor:pointer}
.item.far{font-size:20px;color:#d6d9dd}
.item.mid{font-size:27px;color:#8e949c}
.item.active{height:58px;line-height:58px;font-size:48px;color:#20242a}
.colon{position:relative;z-index:2;width:18px;text-align:center;font-size:34px;font-weight:900;margin:0 -4px}

/* モード2：HH/MM/SS内部表示、数字→▲→▼ */
.stepperWrap{display:none;grid-template-columns:1fr 1fr 1fr;gap:18px;align-items:start;margin:8px 0 20px}
.stepCol{background:#fff;border:1px solid var(--line);border-radius:24px;padding:18px 8px 14px;text-align:center;box-shadow:0 8px 22px rgba(15,23,42,.08);display:flex;flex-direction:column;gap:8px}
.stepLabel{font-size:16px;font-weight:900;color:#64748b;margin-bottom:2px}
.stepValue{font-size:58px;font-weight:900;line-height:1;margin:2px 0 12px;color:#20242a}
.arrowBtn{width:100%;height:58px;border-radius:16px;background:#f8fafc;border:1px solid #cbd5e1;color:#111827;font-size:30px;font-weight:900}
.log{font-size:13px;color:#475569;background:#f8fafc;border:1px solid var(--line);border-radius:12px;padding:10px;height:82px;overflow:auto;white-space:pre-wrap}
.hidden{display:none!important}
.note{text-align:center;color:#64748b;font-weight:800;margin:8px 0 0}
@media(max-width:640px){
 .app{margin:8px auto;padding:10px}
 h1{font-size:21px}
 .result{font-size:36px}
 .grid{grid-template-columns:1fr}
 .picker{height:292px;gap:6px}
 .col{height:280px;width:78px}
 .items{height:280px}
 .item{height:32px;line-height:32px;font-size:22px}
 .item.active{height:56px;line-height:56px;font-size:44px}
 .colon{font-size:32px;width:14px}
 .stepperWrap{gap:10px}
 .stepCol{padding:16px 6px 12px;border-radius:22px}
 .stepValue{font-size:52px}
 .arrowBtn{height:56px;font-size:28px}
}
</style>
</head>
<body>
<div class="app">
<h1>ホイール選択テスト 感度00-20版</h1>

<div class="panel">
  <div class="grid">
    <div class="field"><label>ホイールモード</label><select id="modeSel"><option value="1">モード1：7行ホイール</option><option value="2">モード2：数字＋▲▼</option></select></div>
    <div class="field"><label>iPhone感度（00〜20）</label><select id="sensitivitySel"><option value="0">00</option><option value="1">01</option><option value="2">02</option><option value="3">03</option><option value="4">04</option><option value="5">05</option><option value="6">06</option><option value="7">07</option><option value="8">08</option><option value="9">09</option><option value="10" selected>10</option><option value="11">11</option><option value="12">12</option><option value="13">13</option><option value="14">14</option><option value="15">15</option><option value="16">16</option><option value="17">17</option><option value="18">18</option><option value="19">19</option><option value="20">20</option></select></div>
    <div class="field"><label>PCマウスホイール移動数</label><select id="pcStepSel"><option value="1" selected>1 個</option><option value="2">2 個</option><option value="3">3 個</option></select></div>
    <div class="field"><label>初期値</label><select id="presetSel"><option value="00:00:00">00:00:00</option><option value="00:00:30">00:00:30</option><option value="00:01:00">00:01:00</option><option value="00:02:00">00:02:00</option><option value="00:03:00">00:03:00</option><option value="00:05:00">00:05:00</option><option value="00:10:00">00:10:00</option></select></div>
  </div>
</div>

<div class="panel">
  <div class="result" id="result">00:00:00</div>
  <div class="btns"><button class="primary" id="openBtn">Popを開く</button><button class="green" id="applyPresetBtn">初期値セット</button></div>
  <p class="note">モード2：HH/MM/SS表示・▲(+1)上限Stop・▼(-1)00Stop</p>
  <div class="log" id="log"></div>
</div>
</div>

<div class="modal" id="modal">
  <div class="dialog">
    <div class="head"><button class="iconBtn close" id="cancelBtn">×</button><h2>時刻を選択</h2><button class="iconBtn ok" id="okBtn">✓</button></div>
    <div class="body">
      <div class="picker" id="pickerMode1">
        <div class="col" data-id="hh"><div class="items" id="hhItems"></div></div>
        <div class="colon">:</div>
        <div class="col" data-id="mm"><div class="items" id="mmItems"></div></div>
        <div class="colon">:</div>
        <div class="col" data-id="ss"><div class="items" id="ssItems"></div></div>
      </div>

      <div class="stepperWrap" id="pickerMode2">
        <div class="stepCol"><div class="stepLabel">HH</div><div class="stepValue" id="hhStep">00</div><button class="arrowBtn" data-id="hh" data-d="1">▲</button><button class="arrowBtn" data-id="hh" data-d="-1">▼</button></div>
        <div class="stepCol"><div class="stepLabel">MM</div><div class="stepValue" id="mmStep">00</div><button class="arrowBtn" data-id="mm" data-d="1">▲</button><button class="arrowBtn" data-id="mm" data-d="-1">▼</button></div>
        <div class="stepCol"><div class="stepLabel">SS</div><div class="stepValue" id="ssStep">00</div><button class="arrowBtn" data-id="ss" data-d="1">▲</button><button class="arrowBtn" data-id="ss" data-d="-1">▼</button></div>
      </div>

      <div class="result" id="modalResult">00:00:00</div>
    </div>
  </div>
</div>

<script>
const $=id=>document.getElementById(id), pad=n=>String(n).padStart(2,'0');
const vals={hh:0,mm:0,ss:0}; let temp={hh:0,mm:0,ss:0};

function log(s){const el=$('log');el.textContent=new Date().toLocaleTimeString()+' '+s+'\n'+el.textContent}
function maxOf(id){return id==='hh'?23:59}
function fmtObj(o){return `${pad(o.hh)}:${pad(o.mm)}:${pad(o.ss)}`}
function parseHMS(s){const [h='0',m='0',sec='0']=String(s||'00:00:00').split(':');return {hh:+h||0,mm:+m||0,ss:+sec||0}}
function syncPresetToVals(){const p=parseHMS($('presetSel').value);vals.hh=p.hh;vals.mm=p.mm;vals.ss=p.ss;temp={...vals};renderAll();log('preset '+fmtObj(vals))}
function mode(){return $('modeSel').value}
function sensitivity(){const v=Number($('sensitivitySel').value);return v<=0?1:v}
function pcStep(){return Number($('pcStepSel').value)||1}

function around(id,n){const max=maxOf(id);return [n-3,n-2,n-1,n,n+1,n+2,n+3].map(x=>{while(x<0)x+=max+1;while(x>max)x-=max+1;return x})}
function renderCol(id){
  const box=$(id+'Items'), n=temp[id]; box.innerHTML='';
  around(id,n).forEach((v,i)=>{
    const d=document.createElement('div');let cls='item';
    if(i===3)cls+=' active';else if(i===0||i===6)cls+=' far';else if(i===2||i===4)cls+=' mid';
    d.className=cls;d.textContent=pad(v);d.dataset.pos=i;d.dataset.value=v;
    const choose=e=>{e.preventDefault();e.stopPropagation();const pos=Number(d.dataset.pos);if(pos<3)changeWrap(id,-1);else if(pos>3)changeWrap(id,1);else setValWrap(id,Number(d.dataset.value))};
    d.addEventListener('click',choose);d.addEventListener('touchend',choose,{passive:false});box.appendChild(d)
  })
}
function renderStepper(){$('hhStep').textContent=pad(temp.hh);$('mmStep').textContent=pad(temp.mm);$('ssStep').textContent=pad(temp.ss)}
function renderAll(){
  renderCol('hh');renderCol('mm');renderCol('ss');renderStepper();
  $('modalResult').textContent=fmtObj(temp);$('result').textContent=fmtObj(vals);
  $('pickerMode1').classList.toggle('hidden',mode()!=='1');
  $('pickerMode2').style.display=mode()==='2'?'grid':'none';
}
function setValWrap(id,n){const max=maxOf(id);while(n<0)n+=max+1;while(n>max)n-=max+1;temp[id]=n;renderAll()}
function changeWrap(id,delta){setValWrap(id,temp[id]+delta);log(id+' wrap '+(delta>0?'+':'')+delta+' -> '+pad(temp[id]))}
function mode2Step(id,delta){
  const max=maxOf(id);let n=temp[id]+delta;
  if(n<0)n=0;if(n>max)n=max;
  if(n===temp[id]){log(id+' stop '+pad(n));return}
  temp[id]=n;renderAll();log(id+' '+(delta>0?'+':'')+delta+' -> '+pad(temp[id]))
}

function openModal(){temp={...vals};renderAll();$('modal').classList.add('show');log('open mode '+mode())}
function closeModal(){$('modal').classList.remove('show');log('close')}
function okModal(){vals.hh=temp.hh;vals.mm=temp.mm;vals.ss=temp.ss;renderAll();closeModal();log('ok '+fmtObj(vals))}

function attachMode1(){
  document.querySelectorAll('.col').forEach(col=>{
    const id=col.dataset.id;let startY=null,baseVal=0;
    function start(y,e){startY=y;baseVal=temp[id];e.preventDefault();e.stopPropagation()}
    function move(y,e){if(startY===null)return;const dy=startY-y,delta=Math.trunc(dy/sensitivity());if(delta!==0){const max=maxOf(id),range=max+1;let n=baseVal+delta;n=((n%range)+range)%range;setValWrap(id,n)}e.preventDefault();e.stopPropagation()}
    function end(e){startY=null;e.preventDefault();e.stopPropagation()}
    col.addEventListener('wheel',e=>{e.preventDefault();e.stopPropagation();changeWrap(id,e.deltaY>0?pcStep():-pcStep())},{passive:false});
    col.addEventListener('touchstart',e=>{if(e.touches.length)start(e.touches[0].clientY,e)},{passive:false});
    col.addEventListener('touchmove',e=>{if(e.touches.length)move(e.touches[0].clientY,e)},{passive:false});
    col.addEventListener('touchend',end,{passive:false});col.addEventListener('touchcancel',end,{passive:false})
  });
  $('pickerMode1').addEventListener('touchmove',e=>{e.preventDefault();e.stopPropagation()},{passive:false})
}
function attachMode2(){
  document.querySelectorAll('.arrowBtn').forEach(b=>{
    let timer=null,repeater=null;
    const step=()=>mode2Step(b.dataset.id,Number(b.dataset.d));
    const stop=()=>{if(timer)clearTimeout(timer);if(repeater)clearInterval(repeater);timer=null;repeater=null};
    const start=e=>{e.preventDefault();e.stopPropagation();step();stop();timer=setTimeout(()=>{repeater=setInterval(step,100)},500)};
    b.addEventListener('mousedown',start);b.addEventListener('mouseup',stop);b.addEventListener('mouseleave',stop);
    b.addEventListener('touchstart',start,{passive:false});
    b.addEventListener('touchend',e=>{e.preventDefault();e.stopPropagation();stop()},{passive:false});
    b.addEventListener('touchcancel',e=>{e.preventDefault();e.stopPropagation();stop()},{passive:false});
    b.addEventListener('click',e=>{e.preventDefault();e.stopPropagation()})
  })
}

$('openBtn').onclick=openModal;$('cancelBtn').onclick=closeModal;$('okBtn').onclick=okModal;$('applyPresetBtn').onclick=syncPresetToVals;
$('modeSel').onchange=()=>{renderAll();log('mode '+mode())};
$('sensitivitySel').onchange=()=>log('sensitivity '+sensitivity());
$('pcStepSel').onchange=()=>log('pcStep '+pcStep());
$('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal()});
attachMode1();attachMode2();renderAll();
</script>
</body>
</html>
