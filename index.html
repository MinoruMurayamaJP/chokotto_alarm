<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>ホイール選択テスト 7行版</title>
<style>
:root{--bg:#f5f7fb;--panel:#fff;--line:#d8e2f0;--text:#142033;--blue:#0b78ff;--blue2:#e3f2fd;--red:#ffebee}
*{box-sizing:border-box}
body{margin:0;font-family:"Yu Gothic",Meiryo,system-ui,sans-serif;background:var(--bg);color:var(--text);-webkit-text-size-adjust:100%;overscroll-behavior:none}
.app{max-width:760px;margin:24px auto;padding:16px}
h1{font-size:26px;margin:0 0 12px;text-align:center}
.panel{background:#fff;border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:0 4px 18px rgba(15,23,42,.06)}
.result{text-align:center;font-size:42px;font-weight:900;margin:18px 0;letter-spacing:.04em}
.btns{display:grid;grid-template-columns:1fr 1fr;gap:12px}
button{height:58px;border-radius:14px;border:1px solid #9ec5fe;background:var(--blue2);color:#075fc5;font-size:18px;font-weight:900}
button.primary{background:#0b78ff;color:#fff;border-color:#0b78ff}
.modal{position:fixed;inset:0;background:rgba(15,23,42,.35);display:none;align-items:center;justify-content:center;padding:16px;z-index:50;overscroll-behavior:none}
.modal.show{display:flex}
.dialog{background:#fff;border-radius:28px;width:min(720px,100%);max-height:92vh;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.28)}
.head{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--line)}
.head h2{margin:0;font-size:24px}
.iconBtn{width:60px;height:60px;border-radius:50%;font-size:36px;display:flex;align-items:center;justify-content:center}
.ok{background:#0b78ff;color:#fff;border-color:#0b78ff}
.close{background:#f5f5f5;color:#111;border-color:#d0d0d0}
.body{padding:18px 20px 24px}
.caption{text-align:center;font-size:22px;font-weight:900;margin:8px 0 10px;letter-spacing:.15em}
.picker{position:relative;display:flex;align-items:center;justify-content:center;gap:10px;width:100%;height:320px;margin:0 auto 18px;border-radius:36px;background:linear-gradient(180deg,#fff 0%,#f9fbfd 48%,#f1f5f8 100%);box-shadow:0 12px 30px rgba(15,23,42,.10), inset 0 1px 0 rgba(255,255,255,.95);overflow:hidden;touch-action:none}
.picker:before{content:"";position:absolute;left:24px;right:24px;top:calc(50% - 30px);height:60px;border-radius:999px;background:#e9edf0;z-index:0}
.picker:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.96) 0%,rgba(255,255,255,.35) 18%,rgba(255,255,255,0) 40%,rgba(255,255,255,0) 60%,rgba(255,255,255,.45) 82%,rgba(255,255,255,.96) 100%);pointer-events:none;z-index:3}
.col{position:relative;z-index:2;width:86px;height:320px;overflow:hidden;touch-action:none;-webkit-user-select:none;user-select:none}
.items{height:320px;display:flex;flex-direction:column;justify-content:center}
.item{height:36px;line-height:36px;text-align:center;font-size:24px;font-weight:800;color:#a8adb4}
.item.far{font-size:20px;color:#d6d9dd}
.item.mid{font-size:28px;color:#8e949c}
.item.active{height:60px;line-height:60px;font-size:50px;color:#20242a}
.colon{position:relative;z-index:2;width:18px;text-align:center;font-size:34px;font-weight:900}
.hit{position:absolute;left:0;right:0;z-index:6}
.hit.up{top:0;height:42%}
.hit.down{bottom:0;height:42%}
.log{font-size:13px;color:#475569;background:#f8fafc;border:1px solid var(--line);border-radius:12px;padding:10px;height:80px;overflow:auto;white-space:pre-wrap}
@media(max-width:640px){
 .app{margin:10px auto;padding:12px}
 h1{font-size:22px}
 .result{font-size:38px}
 .dialog{border-radius:26px}
 .head h2{font-size:22px}
 .picker{height:300px;border-radius:34px;gap:6px}
 .col{height:300px;width:78px}
 .items{height:300px}
 .item{height:34px;line-height:34px;font-size:23px}
 .item.active{height:58px;line-height:58px;font-size:46px}
 .colon{font-size:32px;width:14px}
}
</style>
</head>
<body>
<div class="app">
  <h1>ホイール選択テスト 7行版</h1>
  <div class="panel">
    <div class="result" id="result">00:00:00</div>
    <div class="btns">
      <button class="primary" id="openBtn">Popを開く</button>
      <button id="resetBtn">00:00:00</button>
    </div>
    <p style="text-align:center;color:#64748b;font-weight:700">上3行・中央1行・下3行。上側／下側タップ、上下スワイプを試してください。</p>
    <div class="log" id="log"></div>
  </div>
</div>

<div class="modal" id="modal">
  <div class="dialog">
    <div class="head">
      <button class="iconBtn close" id="cancelBtn">×</button>
      <h2>時刻を選択</h2>
      <button class="iconBtn ok" id="okBtn">✓</button>
    </div>
    <div class="body">
      <div class="caption">HH　　MM　　SS</div>
      <div class="picker" id="picker">
        <div class="col" data-id="hh"><div class="items" id="hhItems"></div><div class="hit up"></div><div class="hit down"></div></div>
        <div class="colon">:</div>
        <div class="col" data-id="mm"><div class="items" id="mmItems"></div><div class="hit up"></div><div class="hit down"></div></div>
        <div class="colon">:</div>
        <div class="col" data-id="ss"><div class="items" id="ssItems"></div><div class="hit up"></div><div class="hit down"></div></div>
      </div>
      <div class="result" id="modalResult">00:00:00</div>
    </div>
  </div>
</div>

<script>
const $=id=>document.getElementById(id);
const pad=n=>String(n).padStart(2,'0');
const vals={hh:0,mm:0,ss:0};
let temp={hh:0,mm:0,ss:0};

function log(s){
  const el=$('log');
  el.textContent = new Date().toLocaleTimeString() + ' ' + s + '\n' + el.textContent;
}

function maxOf(id){return id==='hh'?23:59}
function around(id,n){
  const max=maxOf(id);
  return [n-3,n-2,n-1,n,n+1,n+2,n+3].map(x=>{
    while(x<0)x+=max+1;
    while(x>max)x-=max+1;
    return x;
  });
}
function fmtObj(o){return `${pad(o.hh)}:${pad(o.mm)}:${pad(o.ss)}`}

function renderCol(id){
  const box=$(id+'Items');
  const n=temp[id];
  box.innerHTML='';
  around(id,n).forEach((v,i)=>{
    const d=document.createElement('div');
    let cls='item';
    if(i===3) cls+=' active';
    else if(i===0 || i===6) cls+=' far';
    else if(i===2 || i===4) cls+=' mid';
    d.className=cls;
    d.textContent=pad(v);
    d.dataset.pos=i;
    d.dataset.value=v;
    const choose=(e)=>{
      e.preventDefault(); e.stopPropagation();
      const pos=Number(d.dataset.pos);
      if(pos<3) change(id,-1);
      else if(pos>3) change(id,1);
      else setVal(id,Number(d.dataset.value));
    };
    d.addEventListener('click',choose);
    d.addEventListener('touchend',choose,{passive:false});
    box.appendChild(d);
  });
}

function renderAll(){
  renderCol('hh'); renderCol('mm'); renderCol('ss');
  $('modalResult').textContent=fmtObj(temp);
  $('result').textContent=fmtObj(vals);
}

function setVal(id,n){
  const max=maxOf(id);
  if(n<0)n=max;
  if(n>max)n=0;
  temp[id]=n;
  renderAll();
  log(id+'='+pad(n));
}
function change(id,delta){setVal(id,temp[id]+delta)}

function openModal(){
  temp.hh=vals.hh; temp.mm=vals.mm; temp.ss=vals.ss;
  renderAll();
  $('modal').classList.add('show');
  log('open');
}
function closeModal(){
  $('modal').classList.remove('show');
  log('close');
}
function okModal(){
  vals.hh=temp.hh; vals.mm=temp.mm; vals.ss=temp.ss;
  renderAll();
  closeModal();
  log('ok '+fmtObj(vals));
}

function attachColEvents(){
  document.querySelectorAll('.col').forEach(col=>{
    const id=col.dataset.id;
    let lastY=null;
    let touchActive=false;

    function doStart(y,e){
      touchActive=true;
      lastY=y;
      e.preventDefault(); e.stopPropagation();
    }
    function doMove(y,e){
      if(!touchActive || lastY===null)return;
      const dy=y-lastY;
      if(Math.abs(dy)>=18){
        change(id,dy<0?1:-1);
        lastY=y;
      }
      e.preventDefault(); e.stopPropagation();
    }
    function doEnd(e){
      touchActive=false;
      lastY=null;
      e.preventDefault(); e.stopPropagation();
    }

    col.addEventListener('wheel',e=>{
      e.preventDefault();e.stopPropagation();
      change(id,e.deltaY>0?1:-1);
    },{passive:false});

    col.addEventListener('touchstart',e=>{
      if(e.touches.length)doStart(e.touches[0].clientY,e);
    },{passive:false});
    col.addEventListener('touchmove',e=>{
      if(e.touches.length)doMove(e.touches[0].clientY,e);
    },{passive:false});
    col.addEventListener('touchend',doEnd,{passive:false});
    col.addEventListener('touchcancel',doEnd,{passive:false});

    col.querySelector('.hit.up').addEventListener('click',e=>{e.preventDefault();e.stopPropagation();change(id,-1)});
    col.querySelector('.hit.down').addEventListener('click',e=>{e.preventDefault();e.stopPropagation();change(id,1)});
    col.querySelector('.hit.up').addEventListener('touchend',e=>{e.preventDefault();e.stopPropagation();change(id,-1)},{passive:false});
    col.querySelector('.hit.down').addEventListener('touchend',e=>{e.preventDefault();e.stopPropagation();change(id,1)},{passive:false});
  });

  $('picker').addEventListener('touchmove',e=>{
    e.preventDefault();
    e.stopPropagation();
  },{passive:false});
}

$('openBtn').onclick=openModal;
$('cancelBtn').onclick=closeModal;
$('okBtn').onclick=okModal;
$('resetBtn').onclick=()=>{vals.hh=0;vals.mm=0;vals.ss=0;temp.hh=0;temp.mm=0;temp.ss=0;renderAll();log('reset')};
$('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal()});

attachColEvents();
renderAll();
</script>
</body>
</html>
