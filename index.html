<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>ちょこっとアラーム Language版</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="ちょこっとアラーム">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#2563eb">
<link rel="manifest" href="manifest.json">


<link rel="apple-touch-icon" href="./chokotto_alarmA1-192.jpg">
<link rel="icon" href="./chokotto_alarmA1-192.jpg" type="image/jpeg">


<style>
  :root{
    --bg:#f4f6fb; --panel:#fff; --line:#d8deea; --text:#1f2937; --muted:#6b7280;
    --accent:#2563eb; --danger:#dc2626; --ok:#16a34a; --warn:#d97706;
    --c-none:#ffffff; --c-blue:#E3F2FD; --c-green:#E8F5E9; --c-yellow:#FFFDE7; --c-orange:#FFF3E0; --c-red:#FFEBEE; --c-purple:#F3E5F5; --c-gray:#F5F5F5; --c-cyan:#E0F7FA; --c-blue2:#90CAF9; --c-green2:#A5D6A7; --c-yellow2:#FFF59D; --c-orange2:#FFCC80; --c-red2:#EF9A9A; --c-purple2:#CE93D8; --c-gray2:#BDBDBD; --c-cyan2:#80DEEA;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Yu Gothic",Meiryo,system-ui,sans-serif;background:var(--bg);color:var(--text)}
  .app{max-width:1120px;margin:18px auto;padding:0 14px}
  h1{font-size:24px;margin:0 0 12px;text-align:center}

  .topbar{display:flex;align-items:center;justify-content:center;position:relative;margin-bottom:12px}
  .topbar h1{margin:0}
  .lang-toggle{position:absolute;right:0;top:50%;transform:translateY(-50%);height:36px;font-size:14px;padding:5px 12px}
  .version{position:absolute;left:0;top:50%;transform:translateY(-50%);font-size:12px;font-weight:700;color:#6b7280}
  @media (max-width:640px){.topbar{justify-content:center;flex-wrap:wrap;gap:8px}.version{position:static;transform:none;order:1;width:100%;text-align:left}.topbar h1{order:2}.lang-toggle{position:static;transform:none;margin-left:auto;order:3}}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
  .form-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:10px;align-items:end}
  .form-head{font-weight:700;font-size:14px;padding-left:1em;color:var(--text)}
  .form-cell{min-width:0}
  .form-cell input,.form-cell select{width:100%}
  input,select,button{font-size:16px;border-radius:10px;border:1px solid var(--line);height:42px;padding:8px 10px;background:#fff;color:var(--text)}
  input,select{width:100%}
  button{cursor:pointer;font-weight:700;white-space:nowrap}
  button.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  button.danger{background:var(--danger);color:#fff;border-color:var(--danger)}
  button.ghost{background:#f8fafc}
  .actions{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:8px;margin-top:12px;align-items:center}
  .actions select{width:100%;min-width:0}
  .actions button{width:100%}
  .actions button:disabled{opacity:.45;cursor:not-allowed}
  .list-title{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
  .list-title h2{font-size:20px;margin:0}
  .select-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
  .select-actions button{height:34px;font-size:14px;padding:5px 10px}
  .alarm-list{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;align-items:stretch}
  .card{border:1px solid var(--line);border-radius:12px;background:#fff;padding:10px;min-height:132px;display:flex;flex-direction:column;justify-content:space-between;cursor:grab}
  .card.dragging{opacity:.55;outline:3px dashed var(--accent);cursor:grabbing}
  .card.drag-over{box-shadow:0 0 0 3px rgba(37,99,235,.25)}
  .mainline{text-align:center;font-size:18px;font-weight:800;line-height:1.35;word-break:break-word}
  .subline{text-align:center;color:var(--muted);font-size:14px;margin-top:5px;line-height:1.35}
  .card-actions{display:flex;align-items:center;gap:6px;margin-top:9px}
  .card-actions button{height:34px;font-size:13px;padding:5px 8px}
  .url-target{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:14px;font-weight:700;color:var(--muted);white-space:nowrap}
  .url-target input{width:20px;height:20px;padding:0}
  .status-on{color:var(--ok);font-weight:700}.status-off{color:var(--muted);font-weight:700}

  @media (max-width: 980px){
    .alarm-list{grid-template-columns:repeat(2,minmax(0,1fr))}
    .form-grid{grid-template-columns:repeat(4,minmax(0,1fr))}
    .actions{grid-template-columns:1fr 1fr;align-items:stretch}
    .actions select{width:100%}
  }
  @media (max-width: 640px){
    .alarm-list{grid-template-columns:1fr}
    .form-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
    .actions{grid-template-columns:1fr}
    .list-title{align-items:flex-start;flex-direction:column}
  }
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
  .modal.show{display:flex}
  .modal-card{background:#fff;border-radius:18px;padding:28px;max-width:520px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.25)}
  .modal-card h2{font-size:32px;margin:0 0 12px}.modal-card p{font-size:22px;margin:8px 0}.modal-card button{height:56px;font-size:22px;margin-top:18px;padding:8px 30px}
  .urlbox{margin-top:10px;display:none;border:1px solid var(--line);border-radius:12px;padding:12px;text-align:center;font-weight:800;background:#f8fafc}
  .urlbox.show{display:block}
  .urlbox .copy-count{font-size:18px}
  .urlbox .copy-mode{display:inline-block;margin:0 4px;padding:3px 12px;border-radius:999px;font-size:20px;border:1px solid var(--line)}
  .urlbox .copy-mode.keep{background:var(--c-blue)}
  .urlbox .copy-mode.clear{background:var(--c-green)}

  /* 操作色ルール：通常操作=薄青、削除/編集中=薄赤 */
  button,
  button.ghost,
  button.primary{
    background:var(--c-blue) !important;
    color:var(--text) !important;
    border-color:#9ec5fe !important;
  }
  button.danger{
    background:var(--c-red) !important;
    color:var(--text) !important;
    border-color:#f1a7a7 !important;
  }
  button:disabled{
    opacity:.45;
    cursor:not-allowed;
  }
  #inputPanel.editing-mode{
    background:var(--c-red) !important;
    border-color:#f1a7a7;
  }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div id="appVersion" class="version"></div>
    <h1 id="appTitle">ちょこっとアラーム</h1>
    <button class="ghost lang-toggle" id="langToggle" type="button">Japan / English</button>
  </div>
  <section class="panel" id="inputPanel">
    <div class="form-grid">
      <div class="form-head" id="headMode">種類</div>
      <div class="form-head" id="headLabel">ラベル</div>
      <div class="form-head" id="headSound">アラーム音</div>
      <div class="form-head" id="timeTitle">タイマー</div>
      <div class="form-head" id="headRepeat">繰り返し</div>
      <div class="form-head" id="intervalLabel">間隔</div>
      <div class="form-head" id="headColor">背景色</div>

      <div class="form-cell"><select id="mode"><option value="timer">タイマー</option><option value="time">時刻指定</option></select></div>
      <div class="form-cell"><input id="label" type="text" placeholder="例：コーヒー抽出"></div>
      <div class="form-cell"><select id="sound">
        <option value="bell">🔔 ベル</option>
        <option value="buzzer">📢 ブザー</option>
        <option value="chime">🎵 チャイム</option>
        <option value="bird">🐤 小鳥</option>
        <option value="alert">🚨 警報</option>
      </select></div>
      <div class="form-cell"><input id="timer" class="timer-field" type="text" value="00:00:30" placeholder="HH:MM:SS"><input id="alarm" class="time-field" type="time" style="display:none"></div>
      <div class="form-cell"><select id="repeat"><option value="none">なし</option><option value="daily">毎日</option><option value="hourly">毎時</option><option value="minutely">毎分</option><option value="seconds">n秒ごと</option><option value="minutes">n分ごと</option><option value="hours">n時間ごと</option></select></div>
      <div class="form-cell"><input id="interval" type="number" min="1" value="30" placeholder="n" disabled></div>
      <div class="form-cell"><select id="color">
        <option value="none">⬜ なし</option>
        <option value="blue">🟦 薄青</option>
        <option value="blue2">🟦 青</option>
        <option value="green">🟩 薄緑</option>
        <option value="green2">🟩 緑</option>
        <option value="yellow">🟨 薄黄</option>
        <option value="yellow2">🟨 黄</option>
        <option value="orange">🟧 薄橙</option>
        <option value="orange2">🟧 橙</option>
        <option value="red">🟥 薄赤</option>
        <option value="red2">🟥 赤</option>
        <option value="purple">🟪 薄紫</option>
        <option value="purple2">🟪 紫</option>
        <option value="gray">⬜ 薄灰</option>
        <option value="gray2">⬛ 灰</option>
        <option value="cyan">🟦 薄水色</option>
        <option value="cyan2">🟦 水色</option>
      </select></div>
    </div>
    <div class="actions">
      <button class="primary" id="addBtn">追加</button>
      <button class="ghost" id="quoteAddBtn" disabled>引用追加</button>
      <button class="ghost" id="copyKeepUrlBtn">既存URLコピー</button>
      <button class="ghost" id="copyNewUrlBtn">新規URLコピー</button>
      <button class="ghost" id="clearInputBtn">入力クリア</button>
      <button class="danger" id="deleteAllBtn">全削除</button>
    </div>
    <div class="urlbox" id="urlBox"></div>
  </section>

  <section class="panel">
    <div class="list-title">
      <h2 id="listTitle">登録一覧</h2>
      <div class="select-actions"><button class="ghost" id="selectAllBtn">全て選択</button><button class="ghost" id="unselectAllBtn">選択解除</button><button class="ghost" id="startSelectedBtn">対象開始</button><button class="danger" id="stopAllBtn">全て停止</button></div>
    </div>
    <div id="alarmList" class="alarm-list"></div>
  </section>
</div>

<div id="alarmModal" class="modal">
  <div class="modal-card">
    <h2 id="modalLabel">アラーム</h2>
    <p id="modalMemo"></p>
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
      <button class="danger" id="stopAlarmBtn">停止</button>
      <button class="primary" id="continueAlarmBtn">続行</button>
      <button class="ghost" id="soundStopBtn">音止</button>
    </div>
  </div>
</div>

<script>
const LS_KEY='chokotto_alarm_final_v2';
const LANG_KEY='chokotto_alarm_language';
const APP_VERSION='V26.06.15-0110';
let currentLang=localStorage.getItem(LANG_KEY)||'ja';
let alarms=[]; let editingId=null; let currentAlarmId=null; let audioCtx=null; let beepTimer=null; let audioReady=false;
const $=id=>document.getElementById(id);

const I18N={
  ja:{
    title:'ちょこっと アラーム',
    mode:'種類', label:'ラベル', sound:'アラーム音', timer:'タイマー', time:'時刻', repeat:'繰り返し', interval:'間隔', color:'背景色',
    seconds:'秒数', minutes:'分数', hours:'時間数',
    add:'追加', update:'更新', quoteAdd:'引用追加', copyKeep:'既存URLコピー', copyNew:'新規URLコピー',
    clearInput:'入力クリア', cancelEdit:'編集中止', deleteAll:'全削除',
    listTitle:'登録一覧', selectAll:'全て選択', unselectAll:'選択解除', startSelected:'対象開始', stopAll:'全て停止',
    start:'開始', stop:'停止', edit:'編集', delete:'削除', urlTarget:'URL対象',
    continue:'続行', soundStop:'音止', alarm:'アラーム',
    noItems:'登録はありません', noLabel:'(ラベルなし)', remaining:'残り', stopped:'停止中', notStarted:'未開始', next:'次回',
    on:'ON', off:'OFF',
    modeTimer:'タイマー', modeTime:'時刻指定',
    repeatNone:'なし', repeatDaily:'毎日', repeatHourly:'毎時', repeatMinutely:'毎分',
    repeatSeconds:n=>`${n}秒ごと`, repeatMinutes:n=>`${n}分ごと`, repeatHours:n=>`${n}時間ごと`,
    colorNone:'⬜ なし', colorBlue:'🟦 薄青', colorGreen:'🟩 薄緑', colorYellow:'🟨 薄黄', colorOrange:'🟧 薄橙',
    colorRed:'🟥 薄赤', colorPurple:'🟪 薄紫', colorGray:'⬜ 薄灰', colorCyan:'🟦 薄水色', colorBlue2:'🟦 青', colorGreen2:'🟩 緑', colorYellow2:'🟨 黄', colorOrange2:'🟧 橙', colorRed2:'🟥 赤', colorPurple2:'🟪 紫', colorGray2:'⬛ 灰', colorCyan2:'🟦 水色',
    validateLabelMemo:'ラベルを入力してください。', soundBell:'🔔 ベル', soundBuzzer:'📢 ブザー', soundChime:'🎵 チャイム', soundBird:'🐤 小鳥', soundAlert:'🚨 警報',
    validateTimer:'タイマーは HH:MM:SS で入力してください。',
    validateTime:'時刻を入力してください。',
    validateInterval:'間隔を入力してください。',
    selectUrlTarget:'URL対象を選択してください。',
    copiedKeep:c=>`${c}個のアラームを`,
    copiedNew:c=>`${c}個のアラームを`,
    copySuffix:'に追加するURLをコピーしました',
    keepWord:'既存', newWord:'新規',
    deleteThis:'このアラーム',
    confirmDelete:name=>`「${name}」を削除しますか？`,
    noDelete:'削除するアラームはありません。',
    confirmDeleteAll:c=>`${c}件のアラームを削除しますか？`,
    confirmClear:'入力内容をクリアしますか？',
    noStartTarget:'開始対象がありません。',
    confirmStopAll:'全てのアラームを停止しますか？'
  },
  en:{
    title:'Chokotto Alarm',
    mode:'Type', label:'Label', sound:'Sound', timer:'Timer', time:'Time', repeat:'Repeat', interval:'Interval', color:'Color',
    seconds:'Seconds', minutes:'Minutes', hours:'Hours',
    add:'Add', update:'Update', quoteAdd:'Quote Add', copyKeep:'Copy Existing URL', copyNew:'Copy New URL',
    clearInput:'Clear Input', cancelEdit:'Cancel Edit', deleteAll:'Delete All',
    listTitle:'Alarm List', selectAll:'Select All', unselectAll:'Clear Selection', startSelected:'Start Targets', stopAll:'Stop All',
    start:'Start', stop:'Stop', edit:'Edit', delete:'Delete', urlTarget:'URL Target',
    continue:'Continue', soundStop:'Mute', alarm:'Alarm',
    noItems:'No alarms registered', noLabel:'(No label)', remaining:'Left', stopped:'Stopped', notStarted:'Not started', next:'Next',
    on:'ON', off:'OFF',
    modeTimer:'Timer', modeTime:'Time',
    repeatNone:'None', repeatDaily:'Daily', repeatHourly:'Hourly', repeatMinutely:'Every minute',
    repeatSeconds:n=>`Every ${n} sec`, repeatMinutes:n=>`Every ${n} min`, repeatHours:n=>`Every ${n} hr`,
    colorNone:'⬜ None', colorBlue:'🟦 Light blue', colorGreen:'🟩 Light green', colorYellow:'🟨 Light yellow', colorOrange:'🟧 Light orange',
    colorRed:'🟥 Light red', colorPurple:'🟪 Light purple', colorGray:'⬜ Light gray', colorCyan:'🟦 Light cyan', colorBlue2:'🟦 Blue', colorGreen2:'🟩 Green', colorYellow2:'🟨 Yellow', colorOrange2:'🟧 Orange', colorRed2:'🟥 Red', colorPurple2:'🟪 Purple', colorGray2:'⬛ Gray', colorCyan2:'🟦 Cyan',
    validateLabelMemo:'Enter a label.', soundBell:'🔔 Bell', soundBuzzer:'📢 Buzzer', soundChime:'🎵 Chime', soundBird:'🐤 Bird', soundAlert:'🚨 Alert',
    validateTimer:'Enter timer as HH:MM:SS.',
    validateTime:'Enter a time.',
    validateInterval:'Enter an interval.',
    selectUrlTarget:'Select URL Target.',
    copiedKeep:c=>`${c} alarm(s)`,
    copiedNew:c=>`${c} alarm(s)`,
    copySuffix:' URL copied',
    keepWord:'Existing', newWord:'New',
    deleteThis:'this alarm',
    confirmDelete:name=>`Delete "${name}"?`,
    noDelete:'There are no alarms to delete.',
    confirmDeleteAll:c=>`Delete ${c} alarm(s)?`,
    confirmClear:'Clear the input?',
    noStartTarget:'No URL targets selected.',
    confirmStopAll:'Stop all alarms?'
  }
};
function T(k){return (I18N[currentLang]&&I18N[currentLang][k])||I18N.ja[k]||k}
function TF(k,...args){const v=T(k); return typeof v==='function'?v(...args):v}
function setSelectText(selId, pairs){
  const sel=$(selId); if(!sel)return;
  pairs.forEach(([value,text])=>{
    const opt=Array.from(sel.options).find(o=>o.value===value);
    if(opt) opt.textContent=text;
  });
}
function applyLanguage(){
  document.documentElement.lang=currentLang==='ja'?'ja':'en';
  const set=(id,text)=>{const el=$(id); if(el)el.textContent=text};
  set('appTitle',T('title'));
  const ver=$('appVersion'); if(ver) ver.textContent=APP_VERSION;
  document.title=`${T('title')} ${APP_VERSION}`;
  set('headMode',T('mode')); set('headLabel',T('label')); set('headSound',T('sound')); set('headRepeat',T('repeat')); set('headColor',T('color'));
  set('listTitle',T('listTitle'));
  set('selectAllBtn',T('selectAll')); set('unselectAllBtn',T('unselectAll')); set('startSelectedBtn',T('startSelected')); set('stopAllBtn',T('stopAll'));
  set('quoteAddBtn',T('quoteAdd')); set('copyKeepUrlBtn',T('copyKeep')); set('copyNewUrlBtn',T('copyNew')); set('deleteAllBtn',T('deleteAll'));
  set('stopAlarmBtn',T('stop')); set('continueAlarmBtn',T('continue')); set('soundStopBtn',T('soundStop'));
  if(!editingId){set('clearInputBtn',T('clearInput')); set('addBtn',T('add'));} else {set('clearInputBtn',T('cancelEdit')); set('addBtn',T('update'));}
  const modalLabel=$('modalLabel'); if(modalLabel && modalLabel.textContent==='アラーム') modalLabel.textContent=T('alarm');
  const langBtn=$('langToggle'); if(langBtn) langBtn.textContent=currentLang==='ja'?'Japan / English':'English / Japan';
  setSelectText('mode', [['timer',T('modeTimer')],['time',T('modeTime')]]);
  setSelectText('repeat', [['none',T('repeatNone')],['daily',T('repeatDaily')],['hourly',T('repeatHourly')],['minutely',T('repeatMinutely')],['seconds','n '+(currentLang==='ja'?'秒ごと':'seconds')],['minutes','n '+(currentLang==='ja'?'分ごと':'minutes')],['hours','n '+(currentLang==='ja'?'時間ごと':'hours')]]);
  setSelectText('sound', [['bell',T('soundBell')],['buzzer',T('soundBuzzer')],['chime',T('soundChime')],['bird',T('soundBird')],['alert',T('soundAlert')]]);
  setSelectText('color', [['none',T('colorNone')],['blue',T('colorBlue')],['blue2',T('colorBlue2')],['green',T('colorGreen')],['green2',T('colorGreen2')],['yellow',T('colorYellow')],['yellow2',T('colorYellow2')],['orange',T('colorOrange')],['orange2',T('colorOrange2')],['red',T('colorRed')],['red2',T('colorRed2')],['purple',T('colorPurple')],['purple2',T('colorPurple2')],['gray',T('colorGray')],['gray2',T('colorGray2')],['cyan',T('colorCyan')],['cyan2',T('colorCyan2')]]);
  const label=$('label'); if(label) label.placeholder=currentLang==='ja'?'例：コーヒー抽出':'Example: Coffee brew';
  updateMode(); updateInterval();
}

function pad(n){return String(n).padStart(2,'0')}
function fmt(sec){sec=Math.max(0,Math.floor(sec));return `${pad(Math.floor(sec/3600))}:${pad(Math.floor(sec%3600/60))}:${pad(sec%60)}`}
function parseHMS(s){if(!s)return 0; const m=s.trim().match(/^(\d{1,2}):(\d{2}):(\d{2})$/); if(!m)return 0; return +m[1]*3600 + +m[2]*60 + +m[3]}
function save(){localStorage.setItem(LS_KEY,JSON.stringify(alarms))}
function load(){try{alarms=JSON.parse(localStorage.getItem(LS_KEY)||'[]')}catch{alarms=[]} alarms.forEach(a=>{ if(!a.color) a.color='none'; if(!a.sound) a.sound='bell'; if(!a.label && a.memo) a.label=a.memo; delete a.memo; });}
function now(){return Date.now()}
function nextFor(a, from=now()){
  // 停止中は残り時間を出さない。
  // 残り時間が出ている＝稼働中、なのでボタンも「停止」になる。
  if(!a.running) return null;
  if(a.nextAt) return a.nextAt;
  return calcNextAt(a, from);
}
function timerStartSeconds(a){
  // タイマーで「n秒/分/時間ごと」を選んだ場合は、
  // 再スタートもその間隔から開始する。
  const intv=intervalSeconds(a);
  if(a.mode==='timer' && intv>0) return intv;
  return a.duration||0;
}
function calcNextAt(a, from=now()){
  if(a.mode==='timer'){
    const base=timerStartSeconds(a);
    if(!base)return null;
    return from + base*1000;
  }
  if(a.mode==='time'){
    if(!a.alarm)return null;
    const [hh,mm]=a.alarm.split(':').map(Number);
    const d=new Date(from);
    d.setHours(hh||0,mm||0,0,0);
    if(d.getTime()<=from)d.setDate(d.getDate()+1);
    return d.getTime();
  }
  return null;
}
function calcNextAfterFire(a, firedAt=now()){
  if(a.repeat==='none') return null;
  const intv=intervalSeconds(a);
  if(intv>0) return firedAt + intv*1000;
  if(a.mode==='timer') return firedAt + (a.duration||0)*1000;
  if(a.mode==='time' && a.repeat==='daily') return calcNextAt(a, firedAt + 1000);
  return null;
}
function intervalSeconds(a){
  const n=Number(a.interval)||0;
  if(a.repeat==='seconds')return n;
  if(a.repeat==='minutes')return n*60;
  if(a.repeat==='hours')return n*3600;
  if(a.repeat==='minutely')return 60;
  if(a.repeat==='hourly')return 3600;
  if(a.repeat==='daily')return 86400;
  return 0;
}
function repeatText(a){
  const n=a.interval||'';
  if(a.repeat==='seconds')return TF('repeatSeconds',n);
  if(a.repeat==='minutes')return TF('repeatMinutes',n);
  if(a.repeat==='hours')return TF('repeatHours',n);
  return ({none:T('repeatNone'),daily:T('repeatDaily'),hourly:T('repeatHourly'),minutely:T('repeatMinutely')})[a.repeat]||T('repeatNone');
}
function modeText(a){return a.mode==='time'?T('modeTime'):T('modeTimer')}
function soundText(a){return ({bell:T('soundBell'),buzzer:T('soundBuzzer'),chime:T('soundChime'),bird:T('soundBird'),alert:T('soundAlert')})[a.sound||'bell']||T('soundBell')}
function render(){
  const box=$('alarmList'); box.innerHTML='';
  if(!alarms.length){box.innerHTML='<div style="text-align:center;color:var(--muted);padding:18px">'+esc(T('noItems'))+'</div>';return}
  const t=now();
  alarms.forEach(a=>{
    const next=nextFor(a,t);
    const remain=next?fmt((next-t)/1000):T('stopped');
    const nextTxt=next?new Date(next).toLocaleString(currentLang==='ja'?'ja-JP':'en-US',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit'}):T('notStarted');
    const titleMemoRemain=[a.label||T('noLabel'), next?`${T('remaining')}${remain}`:remain].filter(Boolean).join(' ');
    const detail=[modeText(a), soundText(a), repeatText(a), `${T('next')}:${nextTxt}`, a.running?T('on'):T('off')].join(' ');
    const div=document.createElement('div'); div.className='card'; div.draggable=true; div.dataset.id=a.id; div.dataset.color=a.color||'none'; div.style.setProperty('background-color', colorStyle(a.color), 'important');
    div.innerHTML=`
      <div class="mainline">${esc(titleMemoRemain)}</div>
      <div class="subline">${esc(detail)}</div>
      <div class="card-actions">
        <button class="ghost" data-act="toggle" data-id="${a.id}">${a.running?T('stop'):T('start')}</button>
        <button class="ghost" data-act="edit" data-id="${a.id}">${T('edit')}</button>
        <button class="danger" data-act="delete" data-id="${a.id}">${T('delete')}</button>
        <label class="url-target">${T('urlTarget')} <input type="checkbox" data-act="select" data-id="${a.id}" ${a.selected?'checked':''}></label>
      </div>`;
    box.appendChild(div);
  })
}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function colorStyle(c){const map={none:'var(--c-none)',blue:'var(--c-blue)',blue2:'var(--c-blue2)',green:'var(--c-green)',green2:'var(--c-green2)',yellow:'var(--c-yellow)',yellow2:'var(--c-yellow2)',orange:'var(--c-orange)',orange2:'var(--c-orange2)',red:'var(--c-red)',red2:'var(--c-red2)',purple:'var(--c-purple)',purple2:'var(--c-purple2)',gray:'var(--c-gray)',gray2:'var(--c-gray2)',cyan:'var(--c-cyan)',cyan2:'var(--c-cyan2)'};return map[c]||map.none}
function updateColorSwatch(){const sw=$('colorSwatch'); if(sw) sw.style.background=colorStyle($('color').value)}
function setEditState(id){
  editingId=id;
  $('addBtn').textContent = editingId ? T('update') : T('add');
  $('quoteAddBtn').disabled = !editingId;
  $('clearInputBtn').textContent = editingId ? T('cancelEdit') : T('clearInput');
  const panel = $('inputPanel');
  if(panel){
    if(editingId){ panel.classList.add('editing-mode'); }
    else{ panel.classList.remove('editing-mode'); }
  }
}
function clearInputs(){setEditState(null); const ub=$('urlBox'); if(ub){ub.classList.remove('show'); ub.innerHTML='';} $('mode').value='timer'; $('label').value=''; $('sound').value='bell'; $('timer').value='00:00:30'; $('alarm').value=''; $('color').value='none'; $('repeat').value='none'; $('interval').value='30'; updateMode(); updateInterval(); updateColorSwatch()}
function formAlarm(){
  const mode=$('mode').value; const label=$('label').value.trim(); const sound=$('sound').value||'bell'; const color=$('color').value||'none'; const repeat=$('repeat').value; const interval=Number($('interval').value)||0;
  const a={id:editingId||crypto.randomUUID(),mode,label,sound,color,repeat,interval,selected:false,running:false,startedAt:null,lastFired:0};
  if(mode==='timer'){a.timer=$('timer').value.trim(); a.duration=parseHMS(a.timer)} else {a.alarm=$('alarm').value}
  return a;
}
function validateAlarm(a){
  if(!a.label){alert(T('validateLabelMemo')); return false}
  if(a.mode==='timer'&&!a.duration){alert(T('validateTimer')); return false}
  if(a.mode==='time'&&!a.alarm){alert(T('validateTime')); return false}
  if(['seconds','minutes','hours'].includes(a.repeat)&&!a.interval){alert(T('validateInterval')); return false}
  return true;
}
function addOrUpdate(){
  const a=formAlarm(); if(!validateAlarm(a))return;
  if(editingId){
    const i=alarms.findIndex(x=>x.id===editingId);
    if(i < 0){
      alarms.push(a);
    }else{
      const old=alarms[i];
      a.id=editingId;
      a.selected=old && old.selected ? true : false;
      a.running=old && old.running ? true : false;
      a.nextAt=old ? old.nextAt || null : null;
      // 入力欄で選んだ背景色を必ず登録データへ反映する
      a.color = $('color').value || 'none';
      if(a.running){a.startedAt=now(); a.nextAt=calcNextAt(a, now()); a.lastFired=0;}
      alarms[i]=a;
    }
  }else{alarms.push(a)}
  save(); render(); clearInputs();
}
function quoteAdd(){
  const a=formAlarm(); if(!validateAlarm(a))return;
  a.id=crypto.randomUUID(); a.selected=false; a.running=false; a.startedAt=null; a.nextAt=null; a.lastFired=0;
  alarms.push(a); save(); render(); clearInputs();
}
function start(a){a.running=true; a.startedAt=now(); a.nextAt=calcNextAt(a, now()); a.lastFired=0; save(); render()}
function stop(a){a.running=false; a.nextAt=null; save(); render()}
function fire(a){const t=now(); a.lastFired=t; showAlarm(a); const next=calcNextAfterFire(a,t); if(next){a.running=true; a.nextAt=next; a.startedAt=t}else{a.running=false; a.nextAt=null} save(); render()}
function tick(){const t=now(); alarms.forEach(a=>{if(!a.running)return; if(!a.nextAt)a.nextAt=calcNextAt(a,t); if(a.nextAt&&t>=a.nextAt&&(!a.lastFired||t-a.lastFired>1500))fire(a)}); render()}
function showAlarm(a){currentAlarmId=a.id; $('modalLabel').textContent=a.label||T('alarm'); $('modalMemo').textContent=soundText(a); $('alarmModal').classList.add('show'); startBeep(a.sound||'bell')}
function unlockAudio(){
  if(audioReady) return;
  try{
    audioCtx = audioCtx || new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended') audioCtx.resume();
    audioReady=true;
  }catch{}
}
function playTone(freq, duration=.22, type='sine', gainValue=.20, delay=0){
  const startAt=audioCtx.currentTime+delay;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=type;
  o.frequency.value=freq;
  o.connect(g); g.connect(audioCtx.destination);
  g.gain.setValueAtTime(gainValue,startAt);
  g.gain.exponentialRampToValueAtTime(.001,startAt+duration);
  o.start(startAt); o.stop(startAt+duration+.02);
}
function playAlarmPattern(sound){
  if(sound==='chime'){
    playTone(660,.18,'sine',.18,0);
    playTone(880,.22,'sine',.16,.20);
    playTone(990,.26,'sine',.14,.44);
    return;
  }
  if(sound==='bird'){
    playTone(1800,.08,'sine',.12,0);
    playTone(2200,.08,'sine',.12,.12);
    playTone(1800,.08,'sine',.12,.24);
    return;
  }
  if(sound==='alert'){
    playTone(700,.15,'square',.18,0);
    playTone(1200,.15,'square',.18,.18);
    playTone(700,.15,'square',.18,.36);
    playTone(1200,.15,'square',.18,.54);
    return;
  }
  if(sound==='buzzer'){
    playTone(220,.16,'square',.16,0);
    playTone(220,.16,'square',.16,.22);
    return;
  }
  playTone(880,.20,'sine',.20,0);
  playTone(1320,.18,'sine',.14,.24);
}
function startBeep(sound){
  stopBeep(false);
  try{
    audioCtx = audioCtx || new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended') audioCtx.resume();
    const selectedSound=sound||'bell';
    const beep=()=>playAlarmPattern(selectedSound);
    beep(); beepTimer=setInterval(beep,900);
  }catch{}
}
function stopBeep(closeCtx=true){
  if(beepTimer)clearInterval(beepTimer); beepTimer=null;
  // AudioContext は閉じずに残す。ブラウザの自動再生制限を避けるため。
}
function updateMode(){const isTimer=$('mode').value==='timer'; document.querySelectorAll('.timer-field').forEach(e=>e.style.display=isTimer?'block':'none'); document.querySelectorAll('.time-field').forEach(e=>e.style.display=isTimer?'none':'block'); const tt=$('timeTitle'); if(tt)tt.textContent=isTimer?T('timer'):T('time')}
function updateInterval(){const r=$('repeat').value; const input=$('interval'); const label=$('intervalLabel'); const map={seconds:T('seconds'),minutes:T('minutes'),hours:T('hours')}; if(!input.value) input.value='30'; if(map[r]){input.disabled=false; label.textContent=map[r]}else{input.disabled=true; label.textContent=T('interval')}}
function encodeItems(items){return btoa(unescape(encodeURIComponent(JSON.stringify(items.map(({id,selected,running,startedAt,lastFired,nextAt,...x})=>x)))))}
function decodeItems(s){return JSON.parse(decodeURIComponent(escape(atob(s))))}
function copyUrl(isClear){
  const sel=alarms.filter(a=>a.selected);
  if(!sel.length)return alert(T('selectUrlTarget'));
  const u=new URL(location.href);
  u.search='';
  u.searchParams.set('items',encodeItems(sel));
  if(isClear)u.searchParams.set('clear','1');
  navigator.clipboard?.writeText(u.toString()).catch(()=>{});
  const box=$('urlBox');
  const modeText=isClear?T('newWord'):T('keepWord');
  const modeClass=isClear?'clear':'keep';
  box.innerHTML=`<span class="copy-count">${isClear?TF('copiedNew',sel.length):TF('copiedKeep',sel.length)}</span><span class="copy-mode ${modeClass}">${modeText}</span>${T('copySuffix')}`;
  box.classList.add('show');
}
function applyParams(){const p=new URLSearchParams(location.search); if(p.get('clear')==='1'){alarms=[]} if(p.get('items')){try{decodeItems(p.get('items')).forEach(x=>alarms.push({...x,id:crypto.randomUUID(),selected:false,running:false,startedAt:null,nextAt:null,lastFired:0}))}catch(e){console.warn(e)}} else if(p.get('mode')){const mode=p.get('mode'); const a={id:crypto.randomUUID(),mode,label:p.get('label')||'',sound:p.get('sound')||'bell',color:p.get('color')||'none',repeat:p.get('repeat')||'none',interval:Number(p.get('interval'))||0,selected:false,running:p.get('start')==='1',startedAt:null,nextAt:null,lastFired:0}; if(mode==='timer'){a.timer=p.get('timer')||''; a.duration=parseHMS(a.timer)} else {a.alarm=p.get('alarm')||''} if(a.running){a.startedAt=now(); a.nextAt=calcNextAt(a,now())} alarms.push(a)} save(); if(location.search) history.replaceState(null,'',location.pathname)}

function alarmNameForConfirm(a){
  const name = (a && a.label) ? a.label : T('deleteThis');
  return name;
}
function confirmDeleteAlarm(a){
  return confirm(TF('confirmDelete', alarmNameForConfirm(a)));
}
function confirmDeleteAll(){
  const count = alarms.length;
  if(count <= 0){ alert(T('noDelete')); return false; }
  return confirm(TF('confirmDeleteAll', count));
}
function hasInputValue(){
  return !!(
    $('label').value.trim() || $('sound').value !== 'bell' || $('timer').value.trim() || $('alarm').value ||
    $('repeat').value !== 'none' || $('interval').value || $('color').value !== 'none' || $('mode').value !== 'timer'
  );
}
function confirmClearInputIfNeeded(){
  if(editingId || hasInputValue()){
    return confirm(T('confirmClear'));
  }
  return true;
}


function startSelectedAlarms(){
  const selected = alarms.filter(a=>a.selected);
  if(!selected.length){ alert(T('noStartTarget')); return; }
  selected.forEach(a=>{
    a.running=true;
    a.startedAt=now();
    a.nextAt=calcNextAt(a, now());
    a.lastFired=0;
  });
  save();
  render();
}
function stopAllAlarms(){
  if(!alarms.length){ alert(T('noDelete')); return; }
  if(!confirm(T('confirmStopAll'))) return;
  alarms.forEach(a=>{
    a.running=false;
    a.nextAt=null;
  });
  save();
  render();
}

$('langToggle').onclick=()=>{currentLang=currentLang==='ja'?'en':'ja'; localStorage.setItem(LANG_KEY,currentLang); applyLanguage(); render();};
$('mode').addEventListener('change',updateMode); $('repeat').addEventListener('change',updateInterval); $('addBtn').onclick=addOrUpdate; $('quoteAddBtn').onclick=quoteAdd; $('clearInputBtn').onclick=()=>{ if(confirmClearInputIfNeeded()) clearInputs(); }; $('deleteAllBtn').onclick=()=>{if(confirmDeleteAll()){alarms=[];save();render()}}; $('copyKeepUrlBtn').onclick=()=>copyUrl(false); $('copyNewUrlBtn').onclick=()=>copyUrl(true); $('selectAllBtn').onclick=()=>{alarms.forEach(a=>a.selected=true);save();render()}; $('unselectAllBtn').onclick=()=>{alarms.forEach(a=>a.selected=false);save();render()}; $('startSelectedBtn').onclick=startSelectedAlarms; $('stopAllBtn').onclick=stopAllAlarms;
$('stopAlarmBtn').onclick=()=>{stopBeep(); const a=alarms.find(x=>x.id===currentAlarmId); if(a)stop(a); $('alarmModal').classList.remove('show'); currentAlarmId=null};
$('continueAlarmBtn').onclick=()=>{stopBeep(); $('alarmModal').classList.remove('show'); currentAlarmId=null; save(); render()};
$('soundStopBtn').onclick=()=>{stopBeep()};
$('alarmList').addEventListener('click',e=>{const el=e.target.closest('[data-act]'); if(!el)return; const a=alarms.find(x=>x.id===el.dataset.id); if(!a)return; const act=el.dataset.act; if(act==='toggle')a.running?stop(a):start(a); if(act==='delete'){if(confirmDeleteAlarm(a)){alarms=alarms.filter(x=>x.id!==a.id);save();render()}} if(act==='edit'){setEditState(a.id); $('mode').value=a.mode; $('label').value=a.label||''; $('sound').value=a.sound||'bell'; $('color').value=a.color||'none'; $('timer').value=a.timer||''; $('alarm').value=a.alarm||''; $('repeat').value=a.repeat||'none'; $('interval').value=a.interval||''; updateMode(); updateInterval(); updateColorSwatch()} });
$('alarmList').addEventListener('change',e=>{if(e.target.dataset.act==='select'){const a=alarms.find(x=>x.id===e.target.dataset.id); if(a){a.selected=e.target.checked;save()}}});

$('color').addEventListener('change', updateColorSwatch);
let dragId=null;
$('alarmList').addEventListener('dragstart',e=>{
  const card=e.target.closest('.card'); if(!card)return;
  dragId=card.dataset.id; card.classList.add('dragging');
  e.dataTransfer.effectAllowed='move';
  try{e.dataTransfer.setData('text/plain',dragId)}catch{}
});
$('alarmList').addEventListener('dragend',e=>{
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('dragging','drag-over'));
  dragId=null;
});
$('alarmList').addEventListener('dragover',e=>{
  const card=e.target.closest('.card'); if(!card||!dragId||card.dataset.id===dragId)return;
  e.preventDefault();
  document.querySelectorAll('.card.drag-over').forEach(c=>c.classList.remove('drag-over'));
  card.classList.add('drag-over');
});
$('alarmList').addEventListener('dragleave',e=>{
  const card=e.target.closest('.card'); if(card) card.classList.remove('drag-over');
});
$('alarmList').addEventListener('drop',e=>{
  const card=e.target.closest('.card'); if(!card||!dragId)return;
  e.preventDefault(); card.classList.remove('drag-over');
  const from=alarms.findIndex(a=>a.id===dragId);
  const to=alarms.findIndex(a=>a.id===card.dataset.id);
  if(from<0||to<0||from===to)return;
  const [moved]=alarms.splice(from,1);
  alarms.splice(to,0,moved);
  save(); render();
});

document.addEventListener('pointerdown', unlockAudio, {once:true});
load(); applyParams(); applyLanguage(); if(!$('timer').value) $('timer').value='00:00:30'; if(!$('interval').value) $('interval').value='30'; updateMode(); updateInterval(); updateColorSwatch(); render(); setInterval(tick,1000);
</script>
</body>
</html>
