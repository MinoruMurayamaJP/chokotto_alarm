/* iPhone Safari tap target safety */
.rowBtns .btn,
.chk input{
  position:relative;
  z-index:3;
  pointer-events:auto;
}
.chk{
  user-select:none;
  -webkit-user-select:none;
}


/* iPhone風ホイール改善 */
.iosPicker{
  height:300px !important;
  border-radius:40px !important;
  background:linear-gradient(180deg,#fff 0%,#f7fafc 46%,#eef4f8 100%) !important;
}
.iosPicker:before{
  left:30px !important;
  right:30px !important;
  top:calc(50% - 30px) !important;
  height:60px !important;
  background:#e8ecef !important;
}
.iosCol{
  height:268px !important;
}
.iosItems{
  padding:104px 0 !important;
}
.iosItem{
  height:52px !important;
  line-height:52px !important;
  font-size:26px !important;
  color:#a9adb3 !important;
}
.iosItem.active{
  font-size:42px !important;
  color:#20242a !important;
}


/* iPhone風ホイール再調整：中央表示を安定化 */

  height:220px !important;
  padding:8px 16px !important;
  border-radius:34px !important;
}
.iosPicker:before{
  left:28px !important;
  right:28px !important;
  top:calc(50% - 26px) !important;
  height:52px !important;
}
.iosCol{
  width:92px !important;
  height:200px !important;
}
.iosItems{
  padding:74px 0 !important;
}
.iosItem{
  height:52px !important;
  line-height:52px !important;
  font-size:26px !important;
}
.iosItem.active{
  font-size:40px !important;
}
.wheelWrap{
  margin-top:4px !important;
}
.wheelCaption{
  margin:10px 0 4px !important;
}


/* iOS時計サイズ感ホイール */
.iosPicker{
  width:min(520px,100%) !important;
  height:220px !important;
  padding:10px 18px !important;
  border-radius:34px !important;
  gap:10px !important;
  background:linear-gradient(180deg,#ffffff 0%,#f8fafc 45%,#f2f5f8 100%) !important;
  box-shadow:0 12px 28px rgba(15,23,42,.10), inset 0 1px 0 rgba(255,255,255,.95) !important;
}
.iosPicker:before{
  left:24px !important;
  right:24px !important;
  top:calc(50% - 25px) !important;
  height:50px !important;
  border-radius:999px !important;
  background:#e9edf0 !important;
}
.iosCol{
  width:86px !important;
  height:220px !important;
  overflow:hidden !important;
  touch-action:pan-y !important;
}
.iosItems{
  height:220px !important;
  padding:0 !important;
  display:flex !important;
  flex-direction:column !important;
  justify-content:center !important;
}
.iosItem{
  height:38px !important;
  line-height:38px !important;
  text-align:center !important;
  font-size:24px !important;
  font-weight:800 !important;
  color:#b6bbc1 !important;
}
.iosItem:nth-child(1),
.iosItem:nth-child(5){
  color:#d8dadd !important;
  font-size:20px !important;
}
.iosItem:nth-child(2),
.iosItem:nth-child(4){
  color:#9da3aa !important;
  font-size:24px !important;
}
.iosItem.active{
  height:50px !important;
  line-height:50px !important;
  font-size:38px !important;
  color:#20242a !important;
  letter-spacing:.02em !important;
}
.colon{
  font-size:34px !important;
  width:18px !important;
  text-align:center !important;
  margin:0 -4px !important;
  color:#111827 !important;
}
.wheelCaption{
  margin:10px 0 6px !important;
  font-size:20px !important;
  letter-spacing:.08em !important;
}

  }

    margin:0 -3px !important;
  }
}

<body>
<div class="app">
  <div class="top">
    <div class="version" id="appVersion"></div><div class="logo">⏰</div><div class="title"><h1 id="appTitle">ちょこっと アラーム</h1><div class="sub" id="appSub">タイマー・時刻指定・お知らせ</div></div>
    <div class="topBtns"><button class="iconBtn" id="openSettings">⚙ 設定</button></div>
  </div>
  <section class="panel">
    <div class="listHead"><h2 id="listTitle">登録一覧</h2><div class="clock" id="nowClock"></div><button class="reload" onclick="render()">再読込</button></div>
    <div id="alarmList" class="alarmList"></div>
  </section>
  <section class="panel"><div class="bulk">
    <button class="btn" id="selectAllBtn">全て選択</button><button class="btn" id="unselectAllBtn">選択解除</button><button class="btn green" id="startTargetsBtn">対象開始</button><button class="btn" id="stopTargetsBtn">対象停止</button><button class="btn danger" id="deleteTargetsBtn">対象削除</button><button class="btn" id="copyKeepBtn">既存URLコピー</button><button class="btn" id="copyNewBtn">新規URLコピー</button>
  </div><div id="urlMsg" class="urlMsg"></div></section>
</div>

<div class="modal" id="settingsModal"><div class="dialog">
 <div class="dialogHead"><h3 id="modalTitle">アラームの追加・編集</h3><button class="close" id="closeSettings">×</button></div>
 <div class="tabs"><button class="tab active" id="tabEdit">アラーム編集</button><button class="tab" id="tabSystem">システム設定</button></div>
 <div class="body" id="editPane">
  <div class="editGrid">
   <div class="field"><label id="lblLabel">ラベル</label><input id="label" placeholder="例：コーヒー抽出"></div>
   <div class="field"><label id="lblColor">背景色</label><select id="color" class="colorSelect"><option value="none">⬜ なし</option><option value="blue">🟦 薄青</option><option value="green">🟩 薄緑</option><option value="yellow">🟨 薄黄</option><option value="orange">🟧 薄橙</option><option value="red">🟥 薄赤</option><option value="purple">🟪 薄紫</option><option value="gray">⬜ 薄灰</option><option value="cyan">🟦 薄水色</option></select></div>
   <div class="field alarm-only" id="alarmSoundField"><label id="lblSound">アラーム音</label><select id="sound"><option value="buzzer">ブザー（標準）</option><option value="bell">ベル</option><option value="chime">チャイム</option></select></div>
   <div class="field alarm-only" id="volumeField"><label id="lblVolume">音量</label><select id="volume"><option value="small">小</option><option value="medium" selected>中</option><option value="large">大</option></select></div>
   <div class="field notice-only" id="noticeSoundField"><label id="lblNoticeSound">お知らせ音</label><select id="noticeSound"><option value="buzzerShort">ブザー（短め）</option><option value="bell">ベル</option><option value="chime">チャイム</option></select></div>
   <div class="field notice-only" id="bellCountField"><label id="lblBellCount">ベル回数（お知らせ）</label><select id="bellCount"><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option></select></div>

   <div class="field"><label id="lblRepeat">繰り返し</label><select id="repeat"><option value="none">なし</option><option value="daily">毎日</option><option value="hourly">毎時</option><option value="minutely">毎分</option></select></div>
   <div class="field full center"><label id="lblType">種類</label><div class="types"><button class="typeBtn" data-mode="timer">タイマー</button><button class="typeBtn" data-mode="time">時刻指定</button><button class="typeBtn notice" data-mode="notice">お知らせ</button></div></div>
  </div>
  <div class="wheelCaption" id="wheelCaption">時（HH） : 分（MM） : 秒（SS）</div>
  <div class="wheelWrap">
    <select id="hh" class="hiddenNative" aria-label="HH"></select>
    <select id="mm" class="hiddenNative" aria-label="MM"></select>
    <select id="ss" class="hiddenNative" aria-label="SS"></select>
    <div class="iosPicker" id="iosPicker">
      <div class="iosCol" data-target="hh"><div class="iosItems" id="hhItems"></div></div>
      <div class="colon">:</div>
      <div class="iosCol" data-target="mm"><div class="iosItems" id="mmItems"></div></div>
      <div class="colon">:</div>
      <div class="iosCol" data-target="ss"><div class="iosItems" id="ssItems"></div></div>
    </div>
  </div>
  <div class="dialogActions"><button class="btn green" id="addBtn">追加</button><button class="btn" id="quoteBtn" disabled>引用追加</button><button class="btn" id="updateBtn">更新</button><button class="btn" id="clearBtn">キャンセル</button></div>
 </div>
 <div class="body hidden" id="systemPane"><div class="settingsGrid">
  <div class="field"><label id="lblSystemLang">Japan / English</label><select id="sysLang"><option value="ja">Japan</option><option value="en">English</option></select></div>
  <div class="field"><label id="lblNotify">通知許可</label><button class="btn" id="notifyBtn" type="button">通知を許可</button></div>
  <div class="field"><label id="lblVersion">バージョン</label><input id="versionText" type="text" readonly></div>
 </div><div class="dialogActions"><button class="btn" id="systemCancel">キャンセル</button><button class="btn green" id="systemSave">保存</button></div></div>
</div></div>

  setOptions('noticeSound', T('sounds'));
  setOptions('volume', T('volumes'));
}

const WHEEL_ITEM_H=52;
function initWheels(){['hh','mm','ss'].forEach((id,idx)=>{let max=idx===0?23:59, s=$(id), items=$(id+'Items'); s.innerHTML=''; items.innerHTML=''; for(let i=0;i<=max;i++){let v=pad(i); let o=document.createElement('option'); o.value=v; o.textContent=v; s.appendChild(o); let d=document.createElement('div'); d.className='iosItem'; d.dataset.value=v; d.textContent=v; d.onclick=()=>setWheelValue(id,v,true); items.appendChild(d)} const col=document.querySelector(`.iosCol[data-target="${id}"]`); let timer=null; col.addEventListener('scroll',()=>{clearTimeout(timer); timer=setTimeout(()=>snapWheel(id),90)}); col.addEventListener('wheel',()=>{clearTimeout(timer); timer=setTimeout(()=>snapWheel(id),120)},{passive:true}); col.addEventListener('touchend',()=>setTimeout(()=>snapWheel(id),80),{passive:true});}); setHMS('00:00:00')}
function wheelMax(id){return id==='hh'?23:59}
function setWheelValue(id,val,animate=false){val=pad(Math.max(0,Math.min(wheelMax(id),+val||0))); const s=$(id); if(s)s.value=val; const items=$(id+'Items'); if(items)items.querySelectorAll('.iosItem').forEach(x=>x.classList.toggle('active',x.dataset.value===val)); const col=document.querySelector(`.iosCol[data-target="${id}"]`); if(col){const top=(+val)*WHEEL_ITEM_H; col.scrollTo({top:top,behavior:animate?'smooth':'auto'});}}
function snapWheel(id){const col=document.querySelector(`.iosCol[data-target="${id}"]`); if(!col)return; let n=Math.round(col.scrollTop/WHEEL_ITEM_H); n=Math.max(0,Math.min(wheelMax(id),n)); setWheelValue(id,pad(n),true)}
function hms(){return `${$('hh').value}:${$('mm').value}:${$('ss').value}`} function secs(h=hms()){let [a,b,c]=h.split(':').map(Number);return a*3600+b*60+c} function setHMS(s){let [a='00',b='00',c='00']=String(s||'00:00:00').split(':'); setWheelValue('hh',a); setWheelValue('mm',b); setWheelValue('ss',c)}
function refreshWheelPosition(){
  ['hh','mm','ss'].forEach(id=>{
    const s=$(id);
    if(s) setWheelValue(id, s.value || '00', false);
  });
}

function fmt(sec){sec=Math.max(0,Math.floor(sec));return `${pad(Math.floor(sec/3600))}:${pad(Math.floor(sec%3600/60))}:${pad(sec%60)}`}
function save(){localStorage.setItem(LS_KEY,JSON.stringify(alarms))} function load(){try{alarms=JSON.parse(localStorage.getItem(LS_KEY)||'[]')}catch{alarms=[]}}
function colorStyle(c){return {none:'#fff',blue:'var(--blue)',green:'var(--green)',yellow:'var(--yellow)',orange:'var(--orange)',red:'var(--red)',purple:'var(--purple)',gray:'var(--gray)',cyan:'var(--cyan)'}[c]||'#fff'}
function intervalSec(a){let n=+a.interval||0; if(a.repeat==='seconds')return n;if(a.repeat==='minutes')return n*60;if(a.repeat==='hours')return n*3600;if(a.repeat==='minutely')return 60;if(a.repeat==='hourly')return 3600;if(a.repeat==='daily')return 86400;return 0}
function calcNext(a,from=now()){if(a.mode==='timer'||a.mode==='notice')return from+(a.duration||0)*1000; let [h,m,s]=a.hms.split(':').map(Number), d=new Date(from); d.setHours(h,m,s||0,0); if(d.getTime()<=from)d.setDate(d.getDate()+1); return d.getTime()}
function nextAfter(a,t=now()){if(a.repeat==='none')return null; return t+(intervalSec(a)||a.duration||0)*1000}
function modeLabel(a){return T(a.mode)}
function repeatLabel(a){
  let n=a.interval||'';
  return {
    none:T('none'),
    daily:T('daily'),
    hourly:T('hourly'),
    minutely:T('minutely'),
    seconds:`${n}${T('secSuffix')}`,
    minutes:`${n}${T('minSuffix')}`,
    hours:`${n}${T('hourSuffix')}`
  }[a.repeat]||T('none');
}
function render(){ $('appVersion').textContent=APP_VERSION; $('nowClock').textContent=new Date().toLocaleString(lang==='ja'?'ja-JP':'en-US'); const box=$('alarmList'); box.innerHTML=''; if(!alarms.length){box.innerHTML=`<div class="noItems">${T('noItems')}</div>`;return} let t=now(); alarms.forEach((a,idx)=>{let next=a.running?(a.nextAt||calcNext(a,t)):null; let left=next?fmt((next-t)/1000):T('stopped'); let mainTime=a.hms; let row=document.createElement('div'); row.className='row'; row.draggable=true; row.dataset.idx=idx; row.style.background=colorStyle(a.color); row.innerHTML=`<div class="chk"><input type="checkbox" data-act="select" data-idx="${idx}" ${a.selected?'checked':''}><span>${T('target')}</span></div><div class="main"><div><span class="name">${esc(a.label||'No label')}</span><span class="badge ${a.mode==='notice'?'notice':''}">${modeLabel(a)}</span><div class="small">${T('repeat')}：${repeatLabel(a)}</div></div><div class="time">${mainTime}</div><div><div class="state ${a.running?'':'off'}">🔔 ${a.running?T('waiting'):T('stopped')}</div><div class="small">${a.running?T('left')+left:T('next')+'：--'}</div></div><div class="small">${T('next')}：${next?new Date(next).toLocaleTimeString(lang==='ja'?'ja-JP':'en-US'): '--'}</div></div><div class="rowBtns"><button class="btn" data-act="toggle" data-idx="${idx}">${a.running?T('stop'):T('start')}</button><button class="btn" data-act="edit" data-idx="${idx}">${T('edit')}</button><button class="btn" data-act="quote" data-idx="${idx}">${T('quote')}</button><button class="btn danger" data-act="delete" data-idx="${idx}">${T('del')}</button></div>`; box.appendChild(row)})}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function updateModeFields(){const isNotice=mode==='notice'; document.querySelectorAll('.notice-only').forEach(e=>e.classList.toggle('hidden',!isNotice)); document.querySelectorAll('.alarm-only').forEach(e=>e.classList.toggle('hidden',isNotice));}
function setMode(m){mode=m; document.querySelectorAll('.typeBtn').forEach(b=>b.classList.toggle('active',b.dataset.mode===m)); updateModeFields();}
function formAlarm(){return {id:editingId||crypto.randomUUID(),mode,label:$('label').value.trim(),hms:hms(),duration:secs(),repeat:$('repeat').value,interval:+$('interval').value||0,color:$('color').value,sound:$('sound').value,noticeSound:$('noticeSound').value,volume:$('volume').value,bellCount:+$('bellCount').value||1,selected:false,running:false,nextAt:null,lastFired:0}}
function clearForm(){editingId=null; $('label').value=''; $('color').value='none'; $('repeat').value='none'; $('interval').value=''; $('sound').value='buzzer'; $('noticeSound').value='buzzerShort'; $('volume').value='medium'; $('bellCount').value='1'; updateRepeatOptions(); setMode('timer'); setHMS('00:00:00'); $('quoteBtn').disabled=true; $('addBtn').textContent=T('add');}
function addAlarm(keep=true){let a=formAlarm(); if(!a.label||!a.duration){alert(T('validate'));return} alarms.push(a); save(); render(); if(!keep)clearForm()}
function updateAlarm(){if(!editingId)return addAlarm(true); let i=alarms.findIndex(a=>a.id===editingId); if(i<0)return; let old=alarms[i], a=formAlarm(); a.id=editingId; a.selected=old.selected; a.running=old.running; a.nextAt=old.running?calcNext(a):null; alarms[i]=a; save(); render(); clearForm(); closeSettings()}
function editAlarm(a){editingId=a.id; $('label').value=a.label||''; $('color').value=a.color||'none'; $('repeat').value=a.repeat||'none'; $('interval').value=a.interval||''; $('sound').value=a.sound||'buzzer'; $('noticeSound').value=a.noticeSound||'buzzerShort'; $('volume').value=a.volume||'medium'; $('bellCount').value=a.bellCount||1; setMode(a.mode||'timer'); setHMS(a.hms); updateInterval(); $('quoteBtn').disabled=false; $('addBtn').textContent=T('add'); openSettings('edit'); setTimeout(()=>{setHMS(a.hms||'00:00:00'); refreshWheelPosition();},80)}
function start(a){ensureAudioReady(); a.running=true;a.nextAt=calcNext(a);a.lastFired=0;save();render()} function stop(a){a.running=false;a.nextAt=null;save();render()}
function fire(a){a.lastFired=now(); if(a.mode==='notice'){shortBeep(a.bellCount||1,a.noticeSound||'buzzerShort',a.volume||'medium'); let n=nextAfter(a); if(n){a.running=true;a.nextAt=n}else stop(a); save(); render(); return} showAlarm(a); let n=nextAfter(a); if(n){a.running=true;a.nextAt=n}else{a.running=false;a.nextAt=null} save();render()}
function tick(){let t=now(); alarms.forEach(a=>{if(!a.running)return;if(!a.nextAt)a.nextAt=calcNext(a,t);if(a.nextAt&&t>=a.nextAt&&(!a.lastFired||t-a.lastFired>1500))fire(a)});render()}

function ensureAudioReady(){
  try{
    audioCtx = audioCtx || new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state === 'suspended'){
      audioCtx.resume();
    }
  }catch(e){}
}

function volumeGain(v){return v==='large'?.28:v==='small'?.10:.18}
function toneFreq(type){return type==='bell'?1046:type==='chime'?660:880}
function beepOnce(type='buzzer',vol='medium'){ensureAudioReady();audioCtx=audioCtx||new(window.AudioContext||window.webkitAudioContext)(); if(audioCtx.state==='suspended')audioCtx.resume(); let o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.frequency.value=toneFreq(type);o.connect(g);g.connect(audioCtx.destination);g.gain.setValueAtTime(volumeGain(vol),audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+.18);o.start();o.stop(audioCtx.currentTime+.2)}
function shortBeep(n=1,type='buzzerShort',vol='medium'){ensureAudioReady();for(let i=0;i<n;i++)setTimeout(()=>beepOnce(type,vol),i*260)} function startBeep(a){ensureAudioReady();stopBeep(); let type=(a&&a.sound)||'buzzer',vol=(a&&a.volume)||'medium'; beepOnce(type,vol); beepTimer=setInterval(()=>beepOnce(type,vol),650)} function stopBeep(){if(beepTimer)clearInterval(beepTimer);beepTimer=null}
function showAlarm(a){currentAlarmId=a.id;$('alarmText').textContent=a.label||T('alarm');$('alarmModal').classList.add('show');startBeep(a)}
function openSettings(tab='edit'){$('settingsModal').classList.add('show');showTab(tab);setTimeout(refreshWheelPosition,80)} function closeSettings(){$('settingsModal').classList.remove('show')}
function showTab(tab){let edit=tab==='edit';$('editPane').classList.toggle('hidden',!edit);$('systemPane').classList.toggle('hidden',edit);$('tabEdit').classList.toggle('active',edit);$('tabSystem').classList.toggle('active',!edit)}
function repeatBaseOptions(){return [["none",T('none')],["daily",T('daily')],["hourly",T('hourly')],["minutely",T('minutely')]]}
function updateRepeatOptions(){
  const sel=$('repeat'); if(!sel)return;
  const old=sel.value; const n=+$('interval').value||0;
  const opts=repeatBaseOptions();
  if(n>0){opts.push(['seconds',`${n}${T('secSuffix')}`],['minutes',`${n}${T('minSuffix')}`],['hours',`${n}${T('hourSuffix')}`]);}
  sel.innerHTML=opts.map(([v,t])=>`<option value="${v}">${t}</option>`).join('');
  sel.value=opts.some(o=>o[0]===old)?old:'none';
}
function updateInterval(){updateRepeatOptions()}
function selected(){return alarms.filter(a=>a.selected)} function encode(items){return btoa(unescape(encodeURIComponent(JSON.stringify(items.map(({id,selected,running,nextAt,lastFired,...x})=>x)))))} function decode(s){return JSON.parse(decodeURIComponent(escape(atob(s))))}
function copyUrl(clear){let sel=selected(); if(!sel.length)return alert(T('selectTarget')); let u=new URL(location.href);u.search='';u.searchParams.set('items',encode(sel)); if(clear)u.searchParams.set('clear','1'); navigator.clipboard?.writeText(u.toString()); $('urlMsg').innerHTML=T('copied',sel.length,clear?T('new'):T('keep'));$('urlMsg').classList.add('show')}
function applyParams(){let p=new URLSearchParams(location.search); if(p.get('clear')==='1')alarms=[]; if(p.get('items')){try{decode(p.get('items')).forEach(x=>alarms.push({...x,id:crypto.randomUUID(),selected:false,running:false,nextAt:null,lastFired:0}))}catch(e){}} save(); if(location.search)history.replaceState(null,'',location.pathname)}
function applyLang(){
  document.documentElement.lang=lang;
  $('appTitle').textContent=T('title');
  $('appSub').textContent=T('sub');
  document.title=T('title')+' '+APP_VERSION;
  if($('langBtn')) $('langBtn').textContent=lang==='ja'?'Japan / English':'English / Japan';
  $('openSettings').textContent=T('settings');
  const reloadBtn=document.querySelector('.reload');
  if(reloadBtn) reloadBtn.textContent=T('reload');
  $('listTitle').textContent=T('list');
  $('modalTitle').textContent=T('editTitle');
  $('tabEdit').textContent=T('editTab');
  $('tabSystem').textContent=T('sysTab');
  $('lblLabel').textContent=T('label');
  $('lblColor').textContent=T('color');
  $('lblType').textContent=T('type');
  $('lblRepeat').textContent=T('repeat');
  $('lblInterval').textContent=T('interval');
  $('lblNoticeSound').textContent=T('noticeSound');
  $('lblBellCount').textContent=T('bellCount');
  $('lblSound').textContent=T('sound');
  $('lblVolume').textContent=T('volume');
  $('selectAllBtn').textContent=T('selectAll');
  $('unselectAllBtn').textContent=T('unselect');
  $('startTargetsBtn').textContent=T('targetStart');
  $('stopTargetsBtn').textContent=T('targetStop');
  $('deleteTargetsBtn').textContent=T('targetDelete');
  $('copyKeepBtn').textContent=T('copyKeep');
  $('copyNewBtn').textContent=T('copyNew');
  $('addBtn').textContent=T('add');
  $('quoteBtn').textContent=T('quote');
  $('updateBtn').textContent=T('update');
  $('clearBtn').textContent=T('cancel');
  $('systemCancel').textContent=T('cancel');
  $('systemSave').textContent=T('save');
  $('lblSystemLang').textContent=T('systemLang');
  $('lblNotify').textContent=T('notify');
  $('lblVersion').textContent=T('version');
  $('versionText').value=APP_VERSION;
  $('sysLang').value=lang;
  updateNotifyButton();
  document.querySelector('[data-mode="timer"]').textContent=T('timer');
  document.querySelector('[data-mode="time"]').textContent=T('time');
  document.querySelector('[data-mode="notice"]').textContent=T('notice');
  if($('wheelCaption')) $('wheelCaption').textContent='HH　　MM　　SS';
  if($('label')) $('label').placeholder=T('labelPlaceholder');

}


function updateNotifyButton(){
  const b=$('notifyBtn'); if(!b)return;
  if(!('Notification' in window)){b.textContent=lang==='ja'?'通知非対応':'Not supported'; b.disabled=true; return;}
  if(Notification.permission==='granted'){b.textContent=T('notifyGranted'); b.disabled=true;}
  else if(Notification.permission==='denied'){b.textContent=T('notifyDenied'); b.disabled=true;}
  else{b.textContent=T('notifyAllow'); b.disabled=false;}
}
function requestNotify(){
  if(!('Notification' in window))return;
  Notification.requestPermission().then(()=>updateNotifyButton());
}
$('openSettings').onclick=()=>openSettings('edit');$('closeSettings').onclick=closeSettings;$('tabEdit').onclick=()=>showTab('edit');$('tabSystem').onclick=()=>showTab('system');$('systemCancel').onclick=closeSettings;$('systemSave').onclick=closeSettings;$('sysLang').onchange=()=>{lang=$('sysLang').value;localStorage.setItem(LANG_KEY,lang);applyLang()};$('notifyBtn').onclick=requestNotify;document.querySelectorAll('.typeBtn').forEach(b=>b.onclick=()=>setMode(b.dataset.mode));$('interval').oninput=updateRepeatOptions;$('repeat').onchange=updateInterval;$('addBtn').onclick=()=>addAlarm(true);$('updateBtn').onclick=updateAlarm;$('quoteBtn').onclick=()=>addAlarm(true);$('clearBtn').onclick=()=>{clearForm();closeSettings()};
$('selectAllBtn').onclick=()=>{alarms.forEach(a=>a.selected=true);save();render()};$('unselectAllBtn').onclick=()=>{alarms.forEach(a=>a.selected=false);save();render()};$('startTargetsBtn').onclick=()=>{let s=selected();if(!s.length)return alert(T('selectTarget'));s.forEach(start)};$('stopTargetsBtn').onclick=()=>{let s=selected();if(!s.length)return alert(T('selectTarget'));s.forEach(stop)};$('deleteTargetsBtn').onclick=()=>{let s=selected();if(!s.length)return alert(T('selectTarget'));if(confirm(T('deleteConfirm',s.length))){alarms=alarms.filter(a=>!a.selected);save();render()}};$('copyKeepBtn').onclick=()=>copyUrl(false);$('copyNewBtn').onclick=()=>copyUrl(true);
$('alarmList').onclick=e=>{
  const el=e.target.closest('[data-act]');
  if(!el)return;
  const idx=Number(el.dataset.idx);
  if(!Number.isInteger(idx) || idx<0 || idx>=alarms.length)return;
  const a=alarms[idx];
  const act=el.dataset.act;
  if(act==='toggle'){a.running?stop(a):start(a);return;}
  if(act==='edit'){editAlarm(a);return;}
  if(act==='quote'){editAlarm(a); editingId=null; $('quoteBtn').disabled=true;return;}
  if(act==='delete'&&confirm(T('deleteConfirm',1))){alarms.splice(idx,1);save();render();return;}
};
$('alarmList').onchange=e=>{
  if(e.target.dataset.act==='select'){
    const idx=Number(e.target.dataset.idx);
    if(Number.isInteger(idx) && idx>=0 && idx<alarms.length){
      alarms[idx].selected=e.target.checked;
      save();
      render();
    }
  }
};
$('alarmList').addEventListener('dragstart',e=>{let r=e.target.closest('.row');if(!r)return;dragId=Number(r.dataset.idx);r.classList.add('dragging')});$('alarmList').addEventListener('dragend',()=>{document.querySelectorAll('.row').forEach(r=>r.classList.remove('dragging','drag-over'));dragId=null});$('alarmList').addEventListener('dragover',e=>{let r=e.target.closest('.row');if(!r||!dragId||Number(r.dataset.idx)===dragId)return;e.preventDefault();r.classList.add('drag-over')});$('alarmList').addEventListener('dragleave',e=>{let r=e.target.closest('.row');if(r)r.classList.remove('drag-over')});$('alarmList').addEventListener('drop',e=>{let r=e.target.closest('.row');if(!r||!dragId)return;e.preventDefault();let from=dragId,to=Number(r.dataset.idx);if(from<0||to<0)return;let [m]=alarms.splice(from,1);alarms.splice(to,0,m);save();render()});
$('alarmStop').onclick=()=>{stopBeep();let a=alarms.find(x=>x.id===currentAlarmId);if(a)stop(a);$('alarmModal').classList.remove('show')};$('alarmContinue').onclick=()=>{stopBeep();$('alarmModal').classList.remove('show')};$('alarmMute').onclick=()=>stopBeep();document.addEventListener('pointerdown',ensureAudioReady);
document.addEventListener('click',ensureAudioReady);
initWheels();load();applyParams();clearForm();applyLang();setInterval(tick,1000);
</script>
