.chk{display:flex;flex-direction:column;align-items:center;font-weight:700;color:#334155;font-size:12px}.chk input{width:20px;height:20px}.main{display:grid;grid-template-columns:1.2fr 100px 140px 100px;gap:10px;align-items:center}.name{font-size:20px;font-weight:900}.badge{display:inline-block;font-size:13px;border:1px solid #93c5fd;border-radius:999px;padding:3px 10px;background:#eff6ff;color:#075fc5;margin-left:8px}.badge.notice{border-color:#f9a8d4;background:#fdf2f8;color:#db2777}.time{font-size:22px;font-weight:900}.state{font-weight:800;color:#16a34a}.state.off{color:#667085}.small{font-size:13px;color:#475569;margin-top:4px}.rowBtns{display:flex;gap:8px}.btn{height:38px;border:1px solid #9ec5fe;background:var(--blue);border-radius:9px;font-weight:800;cursor:pointer;padding:6px 12px}.btn.danger{background:var(--red);border-color:#f1a7a7;color:#b91c1c}.btn.green{background:var(--green);border-color:#86efac;color:#15803d}.bulk{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:10px}.bulk .btn{width:100%;height:48px}.noItems{text-align:center;color:var(--muted);padding:24px}.urlMsg{display:none;margin-top:10px;text-align:center;font-weight:900;border:1px solid var(--line);border-radius:12px;padding:12px;background:#fff}.urlMsg.show{display:block}.pill{display:inline-block;border-radius:999px;padding:4px 14px;background:var(--blue);border:1px solid var(--line);margin:0 4px}.pill.new{background:var(--green)}
.modal{position:fixed;inset:0;background:rgba(15,23,42,.35);display:none;align-items:center;justify-content:center;z-index:50;padding:16px}.modal.show{display:flex}.dialog{background:#fff;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.25);max-width:760px;width:100%;max-height:92vh;overflow:auto}.dialogHead{display:flex;align-items:center;padding:14px 18px;border-bottom:1px solid var(--line)}.dialogHead h3{margin:0;font-size:20px;flex:1}.close{border:0;background:transparent;font-size:28px;cursor:pointer}.tabs{display:grid;grid-template-columns:1fr 1fr;margin:14px;border:1px solid var(--line);border-radius:10px;overflow:hidden}.tab{height:42px;border:0;background:#fff;font-weight:900;cursor:pointer}.tab.active{background:var(--blue);color:#075fc5}.body{padding:0 16px 16px}.editGrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.field.full{grid-column:1 / -1}.field.center{text-align:center}.field label{display:block;font-size:14px;font-weight:800;margin:0 0 6px}.field input,.field select{width:100%;height:42px;border:1px solid var(--line);border-radius:10px;padding:8px 10px;font-size:16px;background:#fff}.types{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.typeBtn{height:40px;border:1px solid var(--line);background:#fff;border-radius:9px;font-weight:900;cursor:pointer}.typeBtn.active{background:var(--blue);border-color:#5aa2ff;color:#075fc5}.typeBtn.notice.active{background:#fdf2f8;border-color:#f9a8d4;color:#db2777}.wheelCaption{text-align:center;font-size:14px;font-weight:900;margin:14px 0 8px}.wheelWrap{display:flex;justify-content:center;align-items:center;margin-top:6px}.hiddenNative{position:absolute;left:-9999px;width:1px;height:1px;opacity:0}.iosPicker{position:relative;display:flex;align-items:center;justify-content:center;gap:18px;width:min(560px,100%);height:252px;margin:0 auto;padding:16px 22px;border-radius:32px;background:linear-gradient(180deg,#ffffff 0%,#f6f9fc 48%,#eef4f8 100%);box-shadow:0 16px 38px rgba(15,23,42,.12), inset 0 1px 0 rgba(255,255,255,.9);overflow:hidden}.iosPicker:before{content:"";position:absolute;left:28px;right:28px;top:calc(50% - 24px);height:48px;border-radius:999px;background:#e9edf2;z-index:0}.iosPicker:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.96) 0%,rgba(255,255,255,.36) 22%,rgba(255,255,255,0) 42%,rgba(255,255,255,0) 58%,rgba(255,255,255,.44) 78%,rgba(255,255,255,.96) 100%);pointer-events:none;z-index:2}.iosCol{position:relative;z-index:1;width:110px;height:220px;overflow-y:auto;scroll-snap-type:y mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none;overscroll-behavior:contain}.iosCol::-webkit-scrollbar{display:none}.iosItems{padding:86px 0}.iosItem{height:48px;line-height:48px;text-align:center;font-size:28px;font-weight:800;color:#a6abb1;scroll-snap-align:center;transition:font-size .12s,color .12s,transform .12s}.iosItem.active{font-size:38px;color:#2b3036;transform:scale(1.02)}.colon{position:relative;z-index:1;font-size:34px;font-weight:900;color:#111827;margin:0 -2px}.settingsGrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.dialogActions{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:18px}.dialogActions .btn{height:54px}.hidden{display:none!important}.notice-only.hidden,.alarm-only.hidden{display:none!important}.colorSelect option{font-size:16px}
.alarmModal .dialog{max-width:520px;text-align:center}.alarmTitle{font-size:32px;font-weight:900;margin:22px}.alarmActions{display:flex;gap:10px;justify-content:center;margin:18px}.alarmActions .btn{height:56px;font-size:20px}

/* 7行完全表示ホイール（上3・中央1・下3） */
.iosPicker{
  position:relative !important;
  width:100% !important;
  max-width:560px !important;
  height:308px !important;
  margin:0 auto 14px !important;
  border-radius:34px !important;
  gap:10px !important;
  overflow:hidden !important;
  touch-action:none !important;
}
.iosPicker:before{
  content:"" !important;
  position:absolute !important;
  left:24px !important;
  right:24px !important;
  top:calc(50% - 29px) !important;
  height:58px !important;
  border-radius:999px !important;
  background:#e9edf0 !important;
  z-index:0 !important;
}
.iosPicker:after{
  content:"" !important;
  position:absolute !important;
  inset:0 !important;
  background:linear-gradient(180deg,rgba(255,255,255,.88) 0%,rgba(255,255,255,.35) 12%,rgba(255,255,255,0) 30%,rgba(255,255,255,0) 70%,rgba(255,255,255,.35) 88%,rgba(255,255,255,.88) 100%) !important;
  pointer-events:none !important;
  z-index:3 !important;
}
.iosCol{
  position:relative !important;
  z-index:2 !important;
  width:86px !important;
  height:294px !important;
  overflow:visible !important;
  touch-action:none !important;
  -webkit-user-select:none !important;
  user-select:none !important;
}
.iosItems{
  height:294px !important;
  padding:0 !important;
  display:flex !important;
  flex-direction:column !important;
  justify-content:center !important;
  overflow:visible !important;
}
.iosItem{
  height:34px !important;
  line-height:34px !important;
  text-align:center !important;
  font-size:24px !important;
  font-weight:800 !important;
  color:#a8adb4 !important;
  cursor:pointer !important;
}
.iosItem.far{
  font-size:20px !important;
  color:#d6d9dd !important;
}
.iosItem.mid{
  font-size:27px !important;
  color:#8e949c !important;
}
.iosItem.active{
  height:58px !important;
  line-height:58px !important;
  font-size:48px !important;
  color:#20242a !important;
}
.colon{
  position:relative !important;
  z-index:2 !important;
  width:18px !important;
  text-align:center !important;
  font-size:34px !important;
  font-weight:900 !important;
  margin:0 -4px !important;
}
@media(max-width:640px){
  .iosPicker{
    height:292px !important;
    gap:6px !important;
  }
  .iosCol{
    height:280px !important;
    width:78px !important;
  }
  .iosItems{
    height:280px !important;
  }
  .iosItem{
    height:32px !important;
    line-height:32px !important;
    font-size:22px !important;
  }
  .iosItem.active{
    height:56px !important;
    line-height:56px !important;
    font-size:44px !important;
  }
  .colon{
    font-size:32px !important;
    width:14px !important;
  }
}


/* ホイール操作感調整：スライド距離に比例して移動 */
.iosCol,
.iosPicker{
  touch-action:none !important;
}
.iosCol{
  cursor:grab !important;
}
.iosItem{
  pointer-events:auto !important;
}


/* iOS風スクロールホイール方式（本物スクロール + scroll-snap + PCホイール制御） */
.wheelWrap{
  display:flex !important;
  justify-content:center !important;
  align-items:center !important;
  margin-top:6px !important;
}
.iosPicker{
  position:relative !important;
  display:flex !important;
  align-items:center !important;
  justify-content:center !important;
  gap:10px !important;
  width:100% !important;
  max-width:560px !important;
  height:252px !important;
  margin:0 auto 14px !important;
  padding:0 !important;
  border-radius:34px !important;
  background:linear-gradient(180deg,#ffffff 0%,#f9fbfd 48%,#f1f5f8 100%) !important;
  box-shadow:0 12px 30px rgba(15,23,42,.10), inset 0 1px 0 rgba(255,255,255,.95) !important;
  overflow:hidden !important;
}
.iosPicker:before{
  content:"" !important;
  position:absolute !important;
  left:24px !important;
  right:24px !important;
  top:calc(50% - 22px) !important;
  height:44px !important;
  border-radius:999px !important;
  background:rgba(233,237,240,.65) !important;
  border-top:1px solid rgba(0,0,0,.10) !important;
  border-bottom:1px solid rgba(0,0,0,.10) !important;
  z-index:1 !important;
  pointer-events:none !important;
}
.iosPicker:after{
  content:"" !important;
  position:absolute !important;
  inset:0 !important;
  background:linear-gradient(180deg,rgba(255,255,255,.94) 0%,rgba(255,255,255,.35) 18%,rgba(255,255,255,0) 38%,rgba(255,255,255,0) 62%,rgba(255,255,255,.45) 82%,rgba(255,255,255,.94) 100%) !important;
  pointer-events:none !important;
  z-index:3 !important;
}
.iosCol{
  position:relative !important;
  z-index:2 !important;
  width:110px !important;
  height:220px !important;
  overflow-y:scroll !important;
  scroll-snap-type:y mandatory !important;
  -webkit-overflow-scrolling:touch !important;
  scrollbar-width:none !important;
  overscroll-behavior:contain !important;
  touch-action:pan-y !important;
  perspective:1000px !important;
}
.iosCol::-webkit-scrollbar{display:none !important;}
.iosItems{
  list-style:none !important;
  padding:88px 0 !important;
  margin:0 !important;
  height:auto !important;
  display:block !important;
  overflow:visible !important;
}
.iosItem{
  height:44px !important;
  line-height:44px !important;
  text-align:center !important;
  font-size:26px !important;
  font-weight:800 !important;
  color:#333 !important;
  scroll-snap-align:center !important;
  transform-style:preserve-3d !important;
  backface-visibility:hidden !important;
  transition:transform .06s linear, opacity .06s linear, font-size .06s linear, color .06s linear !important;
  cursor:pointer !important;
}
.iosItem.active{
  font-size:36px !important;
  font-weight:900 !important;
  color:#111827 !important;
}
.colon{
  position:relative !important;
  z-index:2 !important;
  width:18px !important;
  text-align:center !important;
  font-size:34px !important;
  font-weight:900 !important;
  color:#111827 !important;
  margin:0 -4px !important;
}
@media(max-width:640px){
  .iosPicker{
    height:242px !important;
    gap:6px !important;
  }
  .iosCol{
    width:88px !important;
    height:210px !important;
  }
  .iosItems{
    padding-top:83px !important;
    padding-bottom:83px !important;
  }
  .iosItem{
    height:44px !important;
    line-height:44px !important;
    font-size:24px !important;
  }
  .iosItem.active{
    font-size:34px !important;
  }
  .colon{
    font-size:30px !important;
    width:14px !important;
  }
}

</style>
</head>
<body>
<div class="app">
  <div class="top">
    <div class="version" id="appVersion"></div><div class="logo">⏰</div><div class="title"><h1 id="appTitle">ちょこっと アラーム</h1><div class="sub" id="appSub">タイマー・時刻指定・お知らせ</div></div>
    <div class="topBtns"><button class="iconBtn" id="langBtn">Japan / English</button><button class="iconBtn" id="openSettings">⚙ 設定</button></div>
  </div>
  <section class="panel">
    <div class="listHead"><h2 id="listTitle">登録一覧</h2><div class="clock" id="nowClock"></div><button class="reload" onclick="render()">再読込</button></div>
    <div id="alarmList" class="alarmList"></div>
  </section>
  <section class="panel"><div class="bulk">
    <button class="btn" id="selectAllBtn">全て選択</button><button class="btn" id="unselectAllBtn">選択解除</button><button class="btn green" id="startTargetsBtn">対象開始</button><button class="btn" id="stopTargetsBtn">対象停止</button><button class="btn danger" id="deleteTargetsBtn">対象削除</button><button class="btn" id="copyKeepBtn">既存URLコピー</button><button class="btn" id="copyNewBtn">新規URLコピー</button>
  </div><div id="urlMsg" class="urlMsg"></div></section>
</div>

<div class="modal" id="settingsModal"><div class="dialog">
 <div class="dialogHead"><h3 id="modalTitle">アラームの追加・編集</h3><button class="close" id="closeSettings">×</button></div>
 <div class="tabs"><button class="tab active" id="tabEdit">アラーム編集</button><button class="tab" id="tabSystem">システム設定</button></div>
 <div class="body" id="editPane">
  <div class="editGrid">
   <div class="field"><label id="lblLabel">ラベル</label><input id="label" placeholder="例：コーヒー抽出"></div>
   <div class="field"><label id="lblColor">背景色</label><select id="color" class="colorSelect"><option value="none">⬜ なし</option><option value="blue">🟦 薄青</option><option value="green">🟩 薄緑</option><option value="yellow">🟨 薄黄</option><option value="orange">🟧 薄橙</option><option value="red">🟥 薄赤</option><option value="purple">🟪 薄紫</option><option value="gray">⬜ 薄灰</option><option value="cyan">🟦 薄水色</option></select></div>
   <div class="field alarm-only" id="alarmSoundField"><label id="lblSound">アラーム音</label><select id="sound"><option value="buzzer">ブザー（標準）</option><option value="bell">ベル</option><option value="chime">チャイム</option></select></div>
   <div class="field alarm-only" id="volumeField"><label id="lblVolume">音量</label><select id="volume"><option value="small">小</option><option value="medium" selected>中</option><option value="large">大</option></select></div>
   <div class="field notice-only" id="noticeSoundField"><label id="lblNoticeSound">お知らせ音</label><select id="noticeSound"><option value="buzzerShort">ブザー（短め）</option><option value="bell">ベル</option><option value="chime">チャイム</option></select></div>
   <div class="field notice-only" id="bellCountField"><label id="lblBellCount">ベル回数（お知らせ）</label><select id="bellCount"><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option></select></div>
   <div class="field"><label id="lblInterval">間隔</label><input id="interval" type="number" min="1" placeholder="n"></div>
   <div class="field"><label id="lblRepeat">繰り返し</label><select id="repeat"><option value="none">なし</option><option value="daily">毎日</option><option value="hourly">毎時</option><option value="minutely">毎分</option></select></div>
   <div class="field full center"><label id="lblType">種類</label><div class="types"><button class="typeBtn" data-mode="timer">タイマー</button><button class="typeBtn" data-mode="time">時刻指定</button><button class="typeBtn notice" data-mode="notice">お知らせ</button></div></div>
  </div>
  <div class="wheelCaption" id="wheelCaption">時（HH） : 分（MM） : 秒（SS）</div>
  <div class="wheelWrap">
    <select id="hh" class="hiddenNative" aria-label="HH"></select>
    <select id="mm" class="hiddenNative" aria-label="MM"></select>
    <select id="ss" class="hiddenNative" aria-label="SS"></select>
    <div class="iosPicker" id="iosPicker">
      <div class="iosCol" data-target="hh"><div class="iosItems" id="hhItems"></div></div>
      <div class="colon">:</div>
      <div class="iosCol" data-target="mm"><div class="iosItems" id="mmItems"></div></div>
      <div class="colon">:</div>
      <div class="iosCol" data-target="ss"><div class="iosItems" id="ssItems"></div></div>
    </div>

    <div class="stepperPicker hidden" id="stepperPicker">
      <div class="stepCol"><div class="stepLabel">HH</div><div class="stepValue" id="hhStep">00</div><button class="arrowBtn" data-id="hh" data-d="1">▲</button><button class="arrowBtn" data-id="hh" data-d="-1">▼</button></div>
      <div class="stepCol"><div class="stepLabel">MM</div><div class="stepValue" id="mmStep">00</div><button class="arrowBtn" data-id="mm" data-d="1">▲</button><button class="arrowBtn" data-id="mm" data-d="-1">▼</button></div>
      <div class="stepCol"><div class="stepLabel">SS</div><div class="stepValue" id="ssStep">00</div><button class="arrowBtn" data-id="ss" data-d="1">▲</button><button class="arrowBtn" data-id="ss" data-d="-1">▼</button></div>
    </div>
  </div>
  <div class="dialogActions"><button class="btn green" id="addBtn">追加</button><button class="btn" id="quoteBtn" disabled>引用追加</button><button class="btn" id="updateBtn">更新</button><button class="btn" id="clearBtn">キャンセル</button></div>
 </div>
 <div class="body hidden" id="systemPane"><div class="settingsGrid">
  <div class="field"><label id="lblSystemLang">Japan / English</label><select id="sysLang"><option value="ja">Japan</option><option value="en">English</option></select></div>
  <div class="field"><label id="lblNotify">通知許可</label><button class="btn" id="notifyBtn" type="button">通知を許可</button></div>
  <div class="field"><label id="lblVersion">バージョン</label><input id="versionText" type="text" readonly></div>

  <div class="field"><label id="lblWheelMode">ホイールモード</label><select id="wheelMode"><option value="1">モード1：iOSスクロール</option><option value="2">モード2：数字＋▲▼</option></select></div>
<div class="field"><label id="lblWheelAngle">3D角度</label><select id="wheelAngle"></select></div>
  <div class="field"><label id="lblPcWheelStep">PCホイール移動数</label><select id="pcWheelStep"><option value="1">1 個</option><option value="2">2 個</option><option value="3">3 個</option></select></div>

 </div><div class="dialogActions"><button class="btn" id="systemCancel">キャンセル</button><button class="btn green" id="systemSave">保存</button></div></div>
</div></div>

<div class="modal alarmModal" id="alarmModal"><div class="dialog"><div class="alarmTitle" id="alarmText">アラーム</div><div class="alarmActions"><button class="btn danger" id="alarmStop">停止</button><button class="btn green" id="alarmContinue">続行</button><button class="btn" id="alarmMute">音止</button></div></div></div>
<script>
const APP_VERSION='Ver.260625-wheel-mode12'; const LS_KEY='chokotto_alarm_v2_pop'; const LANG_KEY='chokotto_alarm_lang';

const WHEEL_ITEM_H=44;
const WHEEL_ANGLE_KEY='chokotto_alarm_wheel_angle';
const PC_WHEEL_STEP_KEY='chokotto_alarm_pc_wheel_step';
const WHEEL_MODE_KEY='chokotto_alarm_wheel_mode';
const wheelVals={hh:'00',mm:'00',ss:'00'};
const wheelIds=['hh','mm','ss'];
let wheelScrollTimer={};

function wheelMode(){
  const el=$('wheelMode');
  return el ? el.value : (localStorage.getItem(WHEEL_MODE_KEY)||'1');
}
function applyWheelMode(){
  const m=wheelMode();
  const ios=$('iosPicker'), stepper=$('stepperPicker');
  if(ios) ios.classList.toggle('hidden',m!=='1');
  if(stepper) stepper.classList.toggle('hidden',m!=='2');
  updateStepper();
}
function updateStepper(){
  if($('hhStep')) $('hhStep').textContent=wheelVals.hh;
  if($('mmStep')) $('mmStep').textContent=wheelVals.mm;
  if($('ssStep')) $('ssStep').textContent=wheelVals.ss;
}
function mode2Step(id,delta){
  const max=wheelMax(id);
  let n=(Number(wheelVals[id])||0)+delta;
  if(n<0)n=0;
  if(n>max)n=max;
  setWheelValue(id,n,'auto');
  updateStepper();
}
function attachStepperEvents(){
  document.querySelectorAll('.arrowBtn').forEach(b=>{
    if(b.dataset.attached==='1')return;
    b.dataset.attached='1';
    let timer=null,repeater=null;
    const step=()=>mode2Step(b.dataset.id,Number(b.dataset.d));
    const stop=()=>{if(timer)clearTimeout(timer);if(repeater)clearInterval(repeater);timer=null;repeater=null};
    const start=e=>{e.preventDefault();e.stopPropagation();step();stop();timer=setTimeout(()=>{repeater=setInterval(step,100)},500)};
    b.addEventListener('mousedown',start);
    b.addEventListener('mouseup',stop);
    b.addEventListener('mouseleave',stop);
    b.addEventListener('touchstart',start,{passive:false});
    b.addEventListener('touchend',e=>{e.preventDefault();e.stopPropagation();stop()},{passive:false});
    b.addEventListener('touchcancel',e=>{e.preventDefault();e.stopPropagation();stop()},{passive:false});
    b.addEventListener('click',e=>{e.preventDefault();e.stopPropagation()});
  });
}


function wheelMax(id){return id==='hh'?23:59}
function wheelAngle(){
  const el=$('wheelAngle');
  const v=el ? Number(el.value) : Number(localStorage.getItem(WHEEL_ANGLE_KEY)||20);
  return isNaN(v)?20:v;
}
function pcWheelStep(){
  const el=$('pcWheelStep');
  const v=el ? Number(el.value) : Number(localStorage.getItem(PC_WHEEL_STEP_KEY)||1);
  return [1,2,3].includes(v)?v:1;
}
function initWheelSettingOptions(){
  const angle=$('wheelAngle');
  if(angle && !angle.options.length){
    for(let i=0;i<=30;i++){
      const o=document.createElement('option');
      o.value=String(i);
      o.textContent=String(i).padStart(2,'0');
      angle.appendChild(o);
    }
    angle.value=localStorage.getItem(WHEEL_ANGLE_KEY)||'20';
  }
  const step=$('pcWheelStep');
  if(step) step.value=localStorage.getItem(PC_WHEEL_STEP_KEY)||'1';
  const mode=$('wheelMode');
  if(mode) mode.value=localStorage.getItem(WHEEL_MODE_KEY)||'1';
  applyWheelMode();
}
function initWheels(){
  initWheelSettingOptions();
  wheelIds.forEach((id,idx)=>{
    const max=idx===0?23:59;
    const s=$(id), box=$(id+'Items');
    if(s){
      s.innerHTML='';
      for(let i=0;i<=max;i++){
        const v=pad(i);
        const o=document.createElement('option');
        o.value=v; o.textContent=v;
        s.appendChild(o);
      }
    }
    if(box){
      box.innerHTML='';
      for(let i=0;i<=max;i++){
        const d=document.createElement('div');
        d.className='iosItem';
        d.textContent=pad(i);
        d.dataset.value=String(i);
        d.addEventListener('click',e=>{
          e.preventDefault();
          e.stopPropagation();
          setWheelValue(id,Number(d.dataset.value),'smooth');
        });
        box.appendChild(d);
      }
    }
  });
  setHMS('00:00:00');
}
function selectedFromScroll(id){
  const col=document.querySelector(`.iosCol[data-target="${id}"]`);
  if(!col)return Number(wheelVals[id])||0;
  let n=Math.round(col.scrollTop/WHEEL_ITEM_H);
  n=Math.max(0,Math.min(wheelMax(id),n));
  return n;
}
function updateWheelRotation(id){
  const col=document.querySelector(`.iosCol[data-target="${id}"]`);
  const box=$(id+'Items');
  if(!col || !box)return;
  const scrollTop=col.scrollTop;
  const centerIndex=Math.max(0,Math.min(wheelMax(id),Math.round(scrollTop/WHEEL_ITEM_H)));
  wheelVals[id]=pad(centerIndex);
  const s=$(id);
  if(s)s.value=pad(centerIndex);
  updateStepper();

  Array.from(box.querySelectorAll('.iosItem')).forEach((item,index)=>{
    const itemOffset=(index*WHEEL_ITEM_H)-scrollTop;
    const angle=(itemOffset/WHEEL_ITEM_H)*-wheelAngle();
    if(Math.abs(angle)<90){
      item.style.transform=`rotateX(${angle}deg) translateZ(90px)`;
      const opacity=Math.max(0,1-Math.abs(itemOffset/(WHEEL_ITEM_H*3.2)));
      item.style.opacity=opacity;
    }else{
      item.style.opacity=0;
    }
    item.classList.toggle('active',index===centerIndex);
  });
}
function updateAllWheelRotations(){
  wheelIds.forEach(updateWheelRotation);
}
function setWheelValue(id,val,behavior='auto'){
  val=Math.max(0,Math.min(wheelMax(id),Number(val)||0));
  wheelVals[id]=pad(val);
  const s=$(id);
  if(s)s.value=pad(val);
  const col=document.querySelector(`.iosCol[data-target="${id}"]`);
  if(col){
    col.scrollTo({top:val*WHEEL_ITEM_H,behavior});
  }
  updateWheelRotation(id);
  updateStepper();
}
function snapWheel(id){
  const n=selectedFromScroll(id);
  setWheelValue(id,n,'smooth');
}
function changeWheel(id,delta){
  const max=wheelMax(id);
  let n=selectedFromScroll(id)+delta;
  if(n<0)n=0;
  if(n>max)n=max;
  setWheelValue(id,n,'smooth');
}
function setHMS(s){
  let [a='00',b='00',c='00']=String(s||'00:00:00').split(':');
  setWheelValue('hh',a);
  setWheelValue('mm',b);
  setWheelValue('ss',c);
}
function refreshWheelPosition(){
  wheelIds.forEach(id=>{
    const s=$(id);
    setWheelValue(id,s && s.value ? s.value : wheelVals[id] || '00','auto');
  });
  updateAllWheelRotations();
}
function hms(){return `${wheelVals.hh}:${wheelVals.mm}:${wheelVals.ss}`}
function attachWheelEvents(){
  initWheelSettingOptions();
  wheelIds.forEach(id=>{
    const col=document.querySelector(`.iosCol[data-target="${id}"]`);
    if(!col || col.dataset.wheelAttached==='1')return;
    col.dataset.wheelAttached='1';

    col.addEventListener('scroll',()=>{
      updateWheelRotation(id);
      clearTimeout(wheelScrollTimer[id]);
      wheelScrollTimer[id]=setTimeout(()=>snapWheel(id),120);
    },{passive:true});

    // PC専用：マウスホイール1ノッチの移動数を固定する
    col.addEventListener('wheel',e=>{
      e.preventDefault();
      e.stopPropagation();
      const dir=e.deltaY>0?1:-1;
      changeWheel(id,dir*pcWheelStep());
    },{passive:false});
  });
  const angle=$('wheelAngle');
  if(angle && angle.dataset.attached!=='1'){
    angle.dataset.attached='1';
    angle.onchange=()=>{
      localStorage.setItem(WHEEL_ANGLE_KEY,angle.value);
      updateAllWheelRotations();
    };
  }
  const step=$('pcWheelStep');
  if(step && step.dataset.attached!=='1'){
    step.dataset.attached='1';
    step.onchange=()=>localStorage.setItem(PC_WHEEL_STEP_KEY,step.value);
  }
  const mode=$('wheelMode');
  if(mode && mode.dataset.attached!=='1'){
    mode.dataset.attached='1';
    mode.onchange=()=>{localStorage.setItem(WHEEL_MODE_KEY,mode.value);applyWheelMode();};
  }
  attachStepperEvents();
  applyWheelMode();
}

function render(){ $('appVersion').textContent=APP_VERSION; $('nowClock').textContent=new Date().toLocaleString(lang==='ja'?'ja-JP':'en-US'); const box=$('alarmList'); box.innerHTML=''; if(!alarms.length){box.innerHTML=`<div class="noItems">${T('noItems')}</div>`;return} let t=now(); alarms.forEach(a=>{let next=a.running?(a.nextAt||calcNext(a,t)):null; let left=next?fmt((next-t)/1000):T('stopped'); let mainTime=a.hms; let row=document.createElement('div'); row.className='row'; row.draggable=true; row.dataset.id=a.id; row.style.background=colorStyle(a.color); row.innerHTML=`<label class="chk"><input type="checkbox" data-act="select" data-id="${a.id}" ${a.selected?'checked':''}>${T('target')}</label><div class="main"><div><span class="name">${esc(a.label||'No label')}</span><span class="badge ${a.mode==='notice'?'notice':''}">${modeLabel(a)}</span><div class="small">${T('repeat')}：${repeatLabel(a)}</div></div><div class="time">${mainTime}</div><div><div class="state ${a.running?'':'off'}">🔔 ${a.running?T('waiting'):T('stopped')}</div><div class="small">${a.running?T('left')+left:T('next')+'：--'}</div></div><div class="small">${T('next')}：${next?new Date(next).toLocaleTimeString(lang==='ja'?'ja-JP':'en-US'): '--'}</div></div><div class="rowBtns"><button class="btn" data-act="toggle" data-id="${a.id}">${a.running?T('stop'):T('start')}</button><button class="btn" data-act="edit" data-id="${a.id}">${T('edit')}</button><button class="btn" data-act="quote" data-id="${a.id}">${T('quote')}</button><button class="btn danger" data-act="delete" data-id="${a.id}">${T('del')}</button></div>`; box.appendChild(row)})}

function updateNotifyButton(){
  const b=$('notifyBtn'); if(!b)return;
  if(!('Notification' in window)){b.textContent=lang==='ja'?'通知非対応':'Not supported'; b.disabled=true; return;}
  if(Notification.permission==='granted'){b.textContent=T('notifyGranted'); b.disabled=true;}
  else if(Notification.permission==='denied'){b.textContent=T('notifyDenied'); b.disabled=true;}
  else{b.textContent=T('notifyAllow'); b.disabled=false;}
}
function requestNotify(){
  if(!('Notification' in window))return;
  Notification.requestPermission().then(()=>updateNotifyButton());
}

$('alarmList').onclick=e=>{let el=e.target.closest('[data-act]'); if(!el)return; let a=alarms.find(x=>x.id===el.dataset.id); if(!a)return; let act=el.dataset.act; if(act==='toggle')a.running?stop(a):start(a); if(act==='edit')editAlarm(a); if(act==='quote'){editAlarm(a); editingId=null; $('quoteBtn').disabled=true} if(act==='delete'&&confirm(T('deleteConfirm',1))){alarms=alarms.filter(x=>x.id!==a.id);save();render()}};
